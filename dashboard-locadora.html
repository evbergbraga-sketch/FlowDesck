<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlowDesck — Locadora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080A10;
      --surface:  #0D0F14;
      --surface2: #111827;
      --border:   #1E2535;
      --border2:  #1A2030;
      --text:     #F1F5F9;
      --muted:    #64748B;
      --muted2:   #475569;
      --accent:   #16A34A;
      --accent2:  #15803D;
      --green:    #22C55E;
      --amber:    #F59E0B;
      --red:      #EF4444;
      --purple:   #8B5CF6;
      --cyan:     #06B6D4;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── TOPBAR ── */
    .topbar {
      height: 56px;
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-logo {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
    }
    .topbar-logo-mark {
      width: 30px; height: 30px; background: var(--accent);
      border-radius: 7px; display: flex; align-items: center; justify-content: center;
    }
    .topbar-logo-mark svg { width: 16px; height: 16px; fill: white; }
    .topbar-sector {
      font-size: 11px; color: var(--muted2); background: var(--border2);
      padding: 3px 10px; border-radius: 20px; letter-spacing: 0.8px; text-transform: uppercase;
    }
    .topbar-sector span { color: var(--accent); }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .topbar-user {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--muted);
    }
    .topbar-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; color: white;
    }
    .btn-icon {
      width: 32px; height: 32px; border-radius: 7px; border: 0.5px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: all 0.15s;
    }
    .btn-icon:hover { background: var(--border2); color: var(--text); }
    .btn-icon svg { width: 16px; height: 16px; }

    /* ── SUBBAR ── */
    .subbar {
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      padding: 10px 20px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .subbar-title {
      font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; margin-right: 8px;
    }
    .filter-input {
      background: var(--bg); border: 0.5px solid var(--border);
      border-radius: 7px; padding: 7px 12px; font-size: 13px; color: var(--text);
      font-family: 'DM Sans', sans-serif; outline: none; width: 200px;
      transition: border-color 0.2s;
    }
    .filter-input:focus { border-color: var(--accent); }
    .filter-input::placeholder { color: var(--muted2); }
    .filter-select {
      background: var(--bg); border: 0.5px solid var(--border);
      border-radius: 7px; padding: 7px 12px; font-size: 12px; color: var(--muted);
      font-family: 'DM Sans', sans-serif; outline: none; cursor: pointer;
      appearance: none;
    }
    .filter-select:focus { border-color: var(--accent); }
    .btn-primary {
      background: var(--accent); border: none; border-radius: 7px;
      padding: 8px 16px; font-size: 13px; font-weight: 500; color: white;
      font-family: 'DM Sans', sans-serif; cursor: pointer; display: flex;
      align-items: center; gap: 6px; transition: background 0.2s;
      margin-left: auto;
    }
    .btn-primary:hover { background: var(--accent2); }
    .btn-primary svg { width: 14px; height: 14px; }

    /* ── LAYOUT PRINCIPAL ── */
    .main-layout {
      display: flex; flex: 1; overflow: hidden;
    }

    /* ── SIDEBAR COMUNICADOS ── */
    .sidebar {
      width: 280px; flex-shrink: 0;
      background: var(--surface); border-right: 0.5px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-header {
      padding: 14px 16px 10px;
      border-bottom: 0.5px solid var(--border2);
    }
    .sidebar-header-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 2px;
    }
    .sidebar-icon {
      width: 24px; height: 24px; background: rgba(245,158,11,0.15);
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
    }
    .sidebar-icon svg { width: 14px; height: 14px; stroke: var(--amber); }
    .sidebar-label {
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    }
    .sidebar-sub { font-size: 11px; color: var(--muted2); }
    .sidebar-body { flex: 1; overflow-y: auto; padding: 12px; }
    .sidebar-body::-webkit-scrollbar { width: 4px; }
    .sidebar-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .announcement-card {
      background: var(--surface2); border: 0.5px solid var(--border);
      border-radius: 8px; padding: 12px; margin-bottom: 8px;
      border-left: 3px solid var(--amber);
    }
    .announcement-card.urgent { border-left-color: var(--red); }
    .announcement-card.important { border-left-color: var(--accent); }
    .announcement-card.pinned { background: rgba(245,158,11,0.06); }
    .ann-header { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 5px; }
    .ann-pin { color: var(--amber); font-size: 11px; flex-shrink: 0; margin-top: 1px; }
    .ann-title { font-size: 13px; font-weight: 500; line-height: 1.3; }
    .ann-body { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 6px; }
    .ann-meta { font-size: 10px; color: var(--muted2); display: flex; gap: 6px; }
    .ann-badge {
      font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 600;
      letter-spacing: 0.3px;
    }
    .ann-badge.urgent { background: rgba(239,68,68,0.15); color: var(--red); }
    .ann-badge.important { background: rgba(59,130,246,0.15); color: var(--accent); }
    .ann-badge.normal { background: var(--border2); color: var(--muted); }

    .admin-ann-btn {
      width: 100%; background: transparent; border: 0.5px dashed var(--border);
      border-radius: 8px; padding: 10px; font-size: 12px; color: var(--muted2);
      font-family: 'DM Sans', sans-serif; cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 6px; transition: all 0.2s;
      margin-top: 4px;
    }
    .admin-ann-btn:hover { border-color: var(--amber); color: var(--amber); }

    /* ── KANBAN AREA ── */
    .kanban-area {
      flex: 1; overflow-x: auto; padding: 16px;
      display: flex; gap: 14px; align-items: flex-start;
    }
    .kanban-area::-webkit-scrollbar { height: 6px; }
    .kanban-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .kanban-col {
      flex-shrink: 0; width: 270px; display: flex; flex-direction: column; gap: 0;
    }
    .col-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; background: var(--surface2);
      border: 0.5px solid var(--border); border-radius: 10px 10px 0 0;
      border-bottom: 2px solid transparent;
    }
    .col-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .col-name { font-size: 13px; font-weight: 500; flex: 1; }
    .col-count {
      font-size: 11px; color: var(--muted2); background: var(--border2);
      padding: 1px 7px; border-radius: 10px;
    }
    .col-body {
      background: rgba(13,15,20,0.5);
      border: 0.5px solid var(--border); border-top: none;
      border-radius: 0 0 10px 10px;
      padding: 8px; min-height: 120px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .col-add-btn {
      width: 100%; background: transparent; border: 0.5px dashed var(--border2);
      border-radius: 6px; padding: 7px; font-size: 12px; color: var(--muted2);
      font-family: 'DM Sans', sans-serif; cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 5px; transition: all 0.15s;
    }
    .col-add-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── CARD ── */
    .fd-card-item {
      background: var(--surface2); border: 0.5px solid var(--border);
      border-radius: 8px; padding: 11px 12px; cursor: pointer;
      transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
      position: relative;
    }
    .fd-card-item:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 16px rgba(59,130,246,0.1);
      transform: translateY(-1px);
    }
    .fd-card-item.dragging { opacity: 0.4; }
    .card-top { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 7px; }
    .card-title { font-size: 13px; font-weight: 500; line-height: 1.3; flex: 1; }
    .card-type-badge {
      font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600;
      white-space: nowrap; flex-shrink: 0;
    }
    .type-feature  { background: rgba(59,130,246,0.15); color: #60A5FA; }
    .type-bug      { background: rgba(239,68,68,0.15); color: #F87171; }
    .type-improvement { background: rgba(139,92,246,0.15); color: #A78BFA; }
    .type-task     { background: rgba(100,116,139,0.15); color: #94A3B8; }
    .card-labels { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 7px; }
    .card-label {
      font-size: 10px; padding: 1px 6px; border-radius: 3px;
      background: var(--border2); color: var(--muted);
    }
    .card-footer { display: flex; align-items: center; gap: 6px; }
    .card-priority {
      font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600;
    }
    .prio-low      { background: rgba(34,197,94,0.15); color: #4ADE80; }
    .prio-medium   { background: rgba(245,158,11,0.15); color: #FCD34D; }
    .prio-high     { background: rgba(239,68,68,0.15); color: #F87171; }
    .prio-urgent   { background: rgba(139,92,246,0.15); color: #A78BFA; }
    .card-due {
      font-size: 10px; color: var(--muted2); margin-left: auto;
      display: flex; align-items: center; gap: 3px;
    }
    .card-due.overdue { color: var(--red); }
    .card-due.soon { color: var(--amber); }
    .card-due svg { width: 11px; height: 11px; }
    .card-assignee {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 600; color: white; flex-shrink: 0;
    }
    .card-sprint {
      font-size: 10px; color: var(--cyan); background: rgba(6,182,212,0.1);
      padding: 1px 6px; border-radius: 3px;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 14px; width: 100%; max-width: 640px; max-height: 85vh;
      display: flex; flex-direction: column; overflow: hidden;
      transform: scale(0.97); transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal-header {
      padding: 18px 20px 14px; border-bottom: 0.5px solid var(--border);
      display: flex; align-items: flex-start; gap: 12px;
    }
    .modal-title-area { flex: 1; }
    .modal-title-input {
      width: 100%; background: transparent; border: none; outline: none;
      font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700;
      color: var(--text); resize: none;
    }
    .modal-title-input::placeholder { color: var(--muted2); }
    .modal-close {
      background: transparent; border: none; cursor: pointer;
      color: var(--muted2); padding: 4px; border-radius: 6px; transition: all 0.15s;
    }
    .modal-close:hover { color: var(--text); background: var(--border2); }
    .modal-close svg { width: 18px; height: 18px; }
    .modal-body { flex: 1; overflow-y: auto; padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; }
    .modal-body::-webkit-scrollbar { width: 4px; }
    .modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .field-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .field-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 120px; }
    .field-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500; }
    .field-select, .field-input {
      background: var(--bg); border: 0.5px solid var(--border);
      border-radius: 7px; padding: 8px 11px; font-size: 13px; color: var(--text);
      font-family: 'DM Sans', sans-serif; outline: none; width: 100%;
      transition: border-color 0.2s; appearance: none;
    }
    .field-select:focus, .field-input:focus { border-color: var(--accent); }
    .field-textarea {
      background: var(--bg); border: 0.5px solid var(--border);
      border-radius: 7px; padding: 10px 11px; font-size: 13px; color: var(--text);
      font-family: 'DM Sans', sans-serif; outline: none; width: 100%; resize: vertical;
      min-height: 90px; transition: border-color 0.2s; line-height: 1.5;
    }
    .field-textarea:focus { border-color: var(--accent); }
    .field-textarea::placeholder { color: var(--muted2); }
    .modal-footer {
      padding: 14px 20px; border-top: 0.5px solid var(--border);
      display: flex; justify-content: flex-end; gap: 8px;
    }
    .btn-ghost {
      background: transparent; border: 0.5px solid var(--border);
      border-radius: 7px; padding: 8px 16px; font-size: 13px; color: var(--muted);
      font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s;
    }
    .btn-ghost:hover { border-color: var(--muted); color: var(--text); }
    .btn-save {
      background: var(--accent); border: none; border-radius: 7px;
      padding: 8px 20px; font-size: 13px; font-weight: 500; color: white;
      font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.2s;
    }
    .btn-save:hover { background: var(--accent2); }
    .btn-danger {
      background: rgba(239,68,68,0.1); border: 0.5px solid rgba(239,68,68,0.3);
      border-radius: 7px; padding: 8px 14px; font-size: 13px; color: var(--red);
      font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s;
      margin-right: auto;
    }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }

    /* modal comunicado */
    .ann-form-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 300; display: flex; align-items: center; justify-content: center;
      padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .ann-form-overlay.open { opacity: 1; pointer-events: auto; }
    .ann-modal {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 14px; width: 100%; max-width: 480px;
      display: flex; flex-direction: column; overflow: hidden;
      transform: scale(0.97); transition: transform 0.2s;
    }
    .ann-form-overlay.open .ann-modal { transform: scale(1); }

    /* toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      background: #16a34a; color: white; padding: 10px 18px;
      border-radius: 8px; font-size: 13px; font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3); opacity: 0;
      transform: translateY(8px); transition: all 0.25s; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error { background: #dc2626; }

    /* empty col */
    .col-empty {
      padding: 20px 0; text-align: center; font-size: 12px; color: var(--muted2);
    }

    /* spinner */
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* drag over */
    .col-body.drag-over { border-color: var(--accent); background: rgba(59,130,246,0.05); }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">
    <div class="topbar-logo-mark">
      <svg viewBox="0 0 24 24"><path d="M4 5h4v4H4zm6 0h4v4h-4zm6 0h4v4h-4zM4 11h4v4H4zm6 0h4v4h-4zm6 0h4v4h-4zM4 17h4v4H4zm6 0h4v4h-4z"/></svg>
    </div>
    FlowDesck
  </div>
  <div class="topbar-sector">Setor: <span>Locadora</span></div>
  <div class="topbar-right">
    <div class="topbar-user">
      <div class="topbar-avatar" id="topAvatar">?</div>
      <span id="topName" style="color:var(--text)">Carregando...</span>
    </div>
    <button class="btn-icon" title="Sair" onclick="handleSignOut()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</div>

<!-- SUBBAR -->
<div class="subbar">
  <div class="subbar-title">Kanban</div>
  <input class="filter-input" id="filterSearch" placeholder="🔍 Buscar cards..." oninput="renderAll()"/>
  <select class="filter-select" id="filterPriority" onchange="renderAll()">
    <option value="">Todas prioridades</option>
    <option value="urgent">Urgente</option>
    <option value="high">Alta</option>
    <option value="medium">Média</option>
    <option value="low">Baixa</option>
  </select>

  <button class="btn-primary" id="btnNewCard" onclick="openCardModal(null, 'backlog')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Novo card
  </button>
</div>

<!-- LAYOUT PRINCIPAL -->
<div class="main-layout">

  <!-- SIDEBAR COMUNICADOS -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-header-row">
        <div class="sidebar-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div>
        <span class="sidebar-label">Comunicados</span>
      </div>
      <div class="sidebar-sub">Avisos de todos os setores</div>
    </div>
    <div class="sidebar-body" id="sidebarAnn">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- KANBAN -->
  <div class="kanban-area" id="kanbanArea">
    <div class="spinner"></div>
  </div>

</div>

<!-- MODAL CARD -->
<div class="modal-overlay" id="cardModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title-area">
        <textarea class="modal-title-input" id="modalTitle" rows="2" placeholder="Título do card..."></textarea>
      </div>
      <button class="modal-close" onclick="closeCardModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Tipo</label>
          <select class="field-select" id="modalType">
            <option value="task">Tarefa</option>
            <option value="feature">Feature</option>
            <option value="bug">Bug</option>
            <option value="improvement">Melhoria</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Prioridade</label>
          <select class="field-select" id="modalPriority">
            <option value="low">Baixa</option>
            <option value="medium" selected>Média</option>
            <option value="high">Alta</option>
            <option value="urgent">Urgente</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Coluna</label>
          <select class="field-select" id="modalColumn">
            <option value="solicitado">Solicitado</option>
            <option value="aprovado">Aprovado</option>
            <option value="em_locacao">Em Locação</option>
            <option value="pendente">Pendente Dev.</option>
            <option value="devolvido">Devolvido</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Sprint</label>
          <input class="field-input" id="modalSprint" placeholder="ex: Sprint 3, S2-2025"/>
        </div>
        <div class="field-group">
          <label class="field-label">Versão/Release</label>
          <input class="field-input" id="modalVersion" placeholder="ex: v1.2.0"/>
        </div>
        <div class="field-group">
          <label class="field-label">Prazo</label>
          <input class="field-input" id="modalDue" type="date"/>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Descrição</label>
        <textarea class="field-textarea" id="modalDesc" placeholder="Descreva o que precisa ser feito..."></textarea>
      </div>
      <div class="field-group">
        <label class="field-label">Labels (separadas por vírgula)</label>
        <input class="field-input" id="modalLabels" placeholder="ex: api, frontend, urgente"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="btnDeleteCard" onclick="deleteCurrentCard()" style="display:none">Excluir</button>
      <button class="btn-ghost" onclick="closeCardModal()">Cancelar</button>
      <button class="btn-save" onclick="saveCard()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL COMUNICADO (só admin) -->
<div class="ann-form-overlay" id="annModal">
  <div class="ann-modal">
    <div class="modal-header">
      <div class="modal-title-area">
        <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:2px">Novo Comunicado</div>
        <div style="font-size:12px;color:var(--muted)">Visível para todos os setores</div>
      </div>
      <button class="modal-close" onclick="closeAnnModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label class="field-label">Título</label>
        <input class="field-input" id="annTitle" placeholder="Título do comunicado"/>
      </div>
      <div class="field-group">
        <label class="field-label">Mensagem</label>
        <textarea class="field-textarea" id="annBody" placeholder="Escreva o comunicado..."></textarea>
      </div>
      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Prioridade</label>
          <select class="field-select" id="annPriority">
            <option value="normal">Normal</option>
            <option value="important">Importante</option>
            <option value="urgent">Urgente</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Fixar no topo</label>
          <select class="field-select" id="annPinned">
            <option value="false">Não</option>
            <option value="true">Sim</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeAnnModal()">Cancelar</button>
      <button class="btn-save" onclick="saveAnnouncement()">Publicar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL  = 'https://ooejtjqxobfrletpssjm.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vZWp0anF4b2JmcmxldHBzc2ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTIzMzY4ODMsImV4cCI6MjA2NzkxMjg4M30.wTCrQfXVD6q47r-vN4iEsPkwaGV0qM-oTGnQpx525Mo';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

const COLUMNS = [
  { id: 'solicitado',  label: 'Solicitado',     color: '#6B7280' },
  { id: 'aprovado',    label: 'Aprovado',       color: '#16A34A' },
  { id: 'em_locacao',  label: 'Em Locação',     color: '#F59E0B' },
  { id: 'pendente',    label: 'Pendente Dev.',  color: '#EF4444' },
  { id: 'devolvido',   label: 'Devolvido',      color: '#22C55E' },
];

const PRIO_LABELS = { low:'Baixa', medium:'Média', high:'Alta', urgent:'Urgente' };
const TYPE_LABELS = { task:'Tarefa', feature:'Feature', bug:'Bug', improvement:'Melhoria' };

let currentUser = null;
let allCards    = [];
let currentCardId = null;

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = './Login.html'; return; }

  const { data: profile } = await supabase
    .from('profiles').select('*').eq('id', session.user.id).single();

  // Redirecionar para troca de senha no primeiro acesso
  if (profile?.first_access) {
    window.location.href = './primeiro-acesso.html';
    return;
  }

  if (!profile?.active) {
    await supabase.auth.signOut();
    window.location.href = './Login.html?msg=conta_inativa';
    return;
  }

  currentUser = { ...session.user, ...profile };
  document.getElementById('topName').textContent = profile.full_name || session.user.email.split('@')[0];
  document.getElementById('topAvatar').textContent = (profile.full_name || 'U')[0].toUpperCase();

  // Oculta botão novo card para colaborador sem setor
  if (!profile.sectors?.includes('desenvolvimento') && profile.role !== 'admin') {
    document.getElementById('btnNewCard').style.display = 'none';
  }

  await Promise.all([loadCards(), loadAnnouncements()]);

  // Realtime
  supabase.channel('cards-loc')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'cards', filter: 'sector=eq.locadora' }, () => loadCards())
    .subscribe();
  supabase.channel('announcements')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'announcements' }, () => loadAnnouncements())
    .subscribe();
}

// ── CARDS ─────────────────────────────────────────────────────────────────────
async function loadCards() {
  const { data, error } = await supabase
    .from('cards').select('*, assignee:assignee_id(full_name)')
    .eq('sector', 'locadora').order('position');
  if (!error) { allCards = data || []; renderAll(); }
}

window.renderAll = function() {
  const search   = (document.getElementById('filterSearch')?.value || '').toLowerCase();
  const priority = document.getElementById('filterPriority')?.value || '';
  const type     = document.getElementById('filterType')?.value || '';

  let cards = allCards.filter(c => {
    if (search && !c.title.toLowerCase().includes(search) && !c.description?.toLowerCase().includes(search)) return false;
    if (priority && c.priority !== priority) return false;
    if (type && c.card_type !== type) return false;
    return true;
  });

  const area = document.getElementById('kanbanArea');
  area.innerHTML = '';

  COLUMNS.forEach(col => {
    const colCards = cards.filter(c => c.column_id === col.id);
    const colEl = document.createElement('div');
    colEl.className = 'kanban-col';
    colEl.innerHTML = `
      <div class="col-header" style="border-bottom-color:${col.color}">
        <div class="col-dot" style="background:${col.color}"></div>
        <span class="col-name">${col.label}</span>
        <span class="col-count">${colCards.length}</span>
      </div>
      <div class="col-body" id="col-${col.id}" data-col="${col.id}">
        ${colCards.length === 0 ? '<div class="col-empty">Sem cards</div>' : colCards.map(cardHTML).join('')}
        <button class="col-add-btn" onclick="openCardModal(null,'${col.id}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Adicionar
        </button>
      </div>
    `;
    area.appendChild(colEl);

    // drag & drop
    const body = colEl.querySelector('.col-body');
    body.addEventListener('dragover', e => { e.preventDefault(); body.classList.add('drag-over'); });
    body.addEventListener('dragleave', () => body.classList.remove('drag-over'));
    body.addEventListener('drop', e => {
      e.preventDefault(); body.classList.remove('drag-over');
      const cardId = e.dataTransfer.getData('cardId');
      if (cardId) moveCard(cardId, col.id);
    });
  });
};

function cardHTML(c) {
  const due = c.due_date ? new Date(c.due_date + 'T12:00:00') : null;
  const today = new Date(); today.setHours(0,0,0,0);
  let dueClass = '', dueIcon = '';
  if (due) {
    const diff = (due - today) / 86400000;
    if (diff < 0) dueClass = 'overdue';
    else if (diff <= 3) dueClass = 'soon';
    dueIcon = `<div class="card-due ${dueClass}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      ${due.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}
    </div>`;
  }
  const typeClass = c.card_type ? `type-${c.card_type}` : 'type-task';
  const typeTxt   = TYPE_LABELS[c.card_type] || 'Tarefa';
  const labels    = (c.labels || []).map(l => `<span class="card-label">${l}</span>`).join('');
  const assignee  = c.assignee?.full_name ? `<div class="card-assignee" title="${c.assignee.full_name}">${c.assignee.full_name[0].toUpperCase()}</div>` : '';
  const sprint    = c.sprint ? `<span class="card-sprint">${c.sprint}</span>` : '';

  return `
    <div class="fd-card-item" draggable="true"
      ondragstart="event.dataTransfer.setData('cardId','${c.id}')"
      onclick="openCardModal('${c.id}')">
      <div class="card-top">
        <div class="card-title">${escHtml(c.title)}</div>
        <span class="card-type-badge ${typeClass}">${typeTxt}</span>
      </div>
      ${labels ? `<div class="card-labels">${labels}</div>` : ''}
      <div class="card-footer">
        <span class="card-priority prio-${c.priority}">${PRIO_LABELS[c.priority]}</span>
        ${sprint}
        ${assignee}
        ${dueIcon}
      </div>
    </div>
  `;
}

async function moveCard(cardId, newCol) {
  const { error } = await supabase.from('cards').update({ column_id: newCol }).eq('id', cardId);
  if (!error) { await loadCards(); showToast('Card movido'); }
}

// ── MODAL CARD ────────────────────────────────────────────────────────────────
window.openCardModal = function(cardId, defaultCol) {
  currentCardId = cardId;
  const overlay = document.getElementById('cardModal');
  const btnDel  = document.getElementById('btnDeleteCard');

  if (cardId) {
    const c = allCards.find(x => x.id === cardId);
    if (!c) return;
    document.getElementById('modalTitle').value    = c.title;
    document.getElementById('modalDesc').value     = c.description || '';
    document.getElementById('modalType').value     = c.card_type || 'task';
    document.getElementById('modalPriority').value = c.priority;
    document.getElementById('modalColumn').value   = c.column_id;
    document.getElementById('modalSprint').value   = c.sprint || '';
    document.getElementById('modalVersion').value  = c.version_tag || '';
    document.getElementById('modalDue').value      = c.due_date || '';
    document.getElementById('modalLabels').value   = (c.labels || []).join(', ');
    btnDel.style.display = (currentUser?.role === 'admin' || currentUser?.role === 'gerente') ? 'block' : 'none';
  } else {
    document.getElementById('modalTitle').value    = '';
    document.getElementById('modalDesc').value     = '';
    document.getElementById('modalType').value     = 'task';
    document.getElementById('modalPriority').value = 'medium';
    document.getElementById('modalColumn').value   = defaultCol || 'solicitado';
    document.getElementById('modalSprint').value   = '';
    document.getElementById('modalVersion').value  = '';
    document.getElementById('modalDue').value      = '';
    document.getElementById('modalLabels').value   = '';
    btnDel.style.display = 'none';
  }

  overlay.classList.add('open');
};

window.closeCardModal = function() {
  document.getElementById('cardModal').classList.remove('open');
  currentCardId = null;
};

window.saveCard = async function() {
  const title = document.getElementById('modalTitle').value.trim();
  if (!title) { showToast('Informe o título', 'error'); return; }

  const labels = document.getElementById('modalLabels').value
    .split(',').map(l => l.trim()).filter(Boolean);

  const payload = {
    title,
    description:  document.getElementById('modalDesc').value.trim() || null,
    card_type:    document.getElementById('modalType').value,
    priority:     document.getElementById('modalPriority').value,
    column_id:    document.getElementById('modalColumn').value,
    sprint:       document.getElementById('modalSprint').value.trim() || null,
    version_tag:  document.getElementById('modalVersion').value.trim() || null,
    due_date:     document.getElementById('modalDue').value || null,
    labels,
    sector:       'locadora',
  };

  let error;
  if (currentCardId) {
    ({ error } = await supabase.from('cards').update(payload).eq('id', currentCardId));
  } else {
    payload.created_by = currentUser.id;
    payload.position   = allCards.filter(c => c.column_id === payload.column_id).length;
    ({ error } = await supabase.from('cards').insert(payload));
  }

  if (error) { showToast('Erro ao salvar', 'error'); console.error(error); return; }
  showToast(currentCardId ? 'Card atualizado!' : 'Card criado!');
  closeCardModal();
  await loadCards();
};

window.deleteCurrentCard = async function() {
  if (!currentCardId || !confirm('Excluir este card?')) return;
  const { error } = await supabase.from('cards').delete().eq('id', currentCardId);
  if (!error) { showToast('Card excluído'); closeCardModal(); await loadCards(); }
  else showToast('Erro ao excluir', 'error');
};

// ── COMUNICADOS ───────────────────────────────────────────────────────────────
async function loadAnnouncements() {
  const { data, error } = await supabase
    .from('announcements')
    .select('*, author:author_id(full_name)')
    .order('pinned', { ascending: false })
    .order('created_at', { ascending: false })
    .limit(30);

  const body = document.getElementById('sidebarAnn');
  if (error || !data?.length) {
    body.innerHTML = `<div class="col-empty" style="margin-top:20px">Nenhum comunicado ainda.</div>`;
    if (currentUser?.role === 'admin') body.innerHTML += adminBtn();
    return;
  }

  const now = new Date();
  const active = data.filter(a => !a.expires_at || new Date(a.expires_at) > now);

  body.innerHTML = active.map(a => {
    const pinIcon = a.pinned ? '<span class="ann-pin">📌</span>' : '';
    const badge   = `<span class="ann-badge ${a.priority}">${a.priority === 'urgent' ? 'URGENTE' : a.priority === 'important' ? 'IMPORTANTE' : 'AVISO'}</span>`;
    const dt      = new Date(a.created_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
    return `
      <div class="announcement-card ${a.priority} ${a.pinned ? 'pinned' : ''}">
        <div class="ann-header">
          ${pinIcon}
          <div class="ann-title">${escHtml(a.title)}</div>
        </div>
        <div class="ann-body">${escHtml(a.body)}</div>
        <div class="ann-meta">${badge}<span>${dt} · ${escHtml(a.author?.full_name || 'Admin')}</span></div>
      </div>
    `;
  }).join('');

  if (currentUser?.role === 'admin') body.innerHTML += adminBtn();
}

function adminBtn() {
  return `<button class="admin-ann-btn" onclick="openAnnModal()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Novo comunicado
  </button>`;
}

window.openAnnModal  = function() { document.getElementById('annModal').classList.add('open'); };
window.closeAnnModal = function() { document.getElementById('annModal').classList.remove('open'); };

window.saveAnnouncement = async function() {
  const title = document.getElementById('annTitle').value.trim();
  const body  = document.getElementById('annBody').value.trim();
  if (!title || !body) { showToast('Preencha título e mensagem', 'error'); return; }

  const { error } = await supabase.from('announcements').insert({
    title, body,
    priority:  document.getElementById('annPriority').value,
    pinned:    document.getElementById('annPinned').value === 'true',
    author_id: currentUser.id,
  });

  if (error) { showToast('Erro ao publicar', 'error'); return; }
  showToast('Comunicado publicado!');
  closeAnnModal();
  document.getElementById('annTitle').value = '';
  document.getElementById('annBody').value  = '';
  await loadAnnouncements();
};

// ── SIGNOUT ───────────────────────────────────────────────────────────────────
window.handleSignOut = async function() {
  await supabase.auth.signOut();
  window.location.href = './Login.html';
};

// ── UTILS ─────────────────────────────────────────────────────────────────────
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = type === 'error' ? 'show error' : 'show';
  setTimeout(() => { el.className = ''; }, 3000);
}

// ── ESC fecha modais ──────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeCardModal(); closeAnnModal(); }
});

init();
</script>
</body>
</html>

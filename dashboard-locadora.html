<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlowDesck — Locadora</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Inter:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <link rel="stylesheet" href="./mobile.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080A10;--surface:#0D0F14;--surface2:#111827;
      --border:#1E2535;--border2:#1A2030;--text:#F1F5F9;
      --muted:#64748B;--muted2:#475569;
      --accent:#0EA5E9;--accent2:#0284C7;
      --green:#22C55E;--amber:#F59E0B;--red:#EF4444;--purple:#8B5CF6;
    }
    html,body{height:100%}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden}

    /* ── TOPBAR ── */
    .topbar{height:52px;background:var(--surface);border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:100}
    .logo{display:flex;align-items:center;gap:8px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
    .logo-mark{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center}
    .logo-mark i{font-size:15px;color:white}
    .sector-badge{font-size:11px;color:var(--accent);background:rgba(14,165,233,.12);border:0.5px solid rgba(14,165,233,.3);padding:3px 10px;border-radius:20px}
    .topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
    .topbar-name{font-size:13px;color:var(--text)}
    .topbar-av{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white}
    .icon-btn{width:30px;height:30px;border-radius:7px;border:0.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .icon-btn:hover{background:var(--border2);color:var(--text)}
    .icon-btn i{font-size:15px}

    /* ── LAYOUT ── */
    .page{display:flex;flex:1;overflow:hidden}

    /* ── SIDEBAR NAV ── */
    .sidebar{width:52px;background:var(--surface);border-right:0.5px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:2px;flex-shrink:0}
    .nav-btn{width:36px;height:36px;border-radius:9px;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;position:relative}
    .nav-btn:hover{background:var(--border2);color:var(--text)}
    .nav-btn.active{background:rgba(14,165,233,.15);color:var(--accent)}
    .nav-btn i{font-size:18px}
    .nav-sep{width:28px;height:0.5px;background:var(--border);margin:6px 0}

    /* ── MAIN ── */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .section{display:none;flex-direction:column;flex:1;overflow:hidden}
    .section.active{display:flex}

    /* ── SEÇÃO PROJETOS ── */
    .sec-header{padding:16px 20px 12px;border-bottom:0.5px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;align-items:center;gap:12px}
    .sec-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;flex:1}
    .btn-primary{background:var(--accent);border:none;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:500;color:white;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s}
    .btn-primary:hover{background:var(--accent2)}
    .btn-primary i{font-size:14px}
    .btn-ghost{background:transparent;border:0.5px solid var(--border);border-radius:7px;padding:7px 14px;font-size:13px;color:var(--muted);font-family:'DM Sans',sans-serif;cursor:pointer}
    .btn-ghost:hover{border-color:var(--border2);color:var(--text)}

    /* Grid de projetos */
    .projects-grid{flex:1;overflow-y:auto;padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;align-content:start}
    .projects-grid::-webkit-scrollbar{width:4px}
    .projects-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    .project-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:border-color .15s,transform .1s;display:flex;flex-direction:column;gap:10px}
    .project-card:hover{border-color:var(--accent);transform:translateY(-2px)}
    .project-card-top{display:flex;align-items:flex-start;gap:10px}
    .project-icon{width:36px;height:36px;border-radius:8px;background:rgba(14,165,233,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .project-icon i{font-size:18px;color:var(--accent)}
    .project-name{font-size:14px;font-weight:600;line-height:1.3;flex:1}
    .project-desc{font-size:12px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .project-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .project-badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
    .badge-active{background:rgba(34,197,94,.15);color:var(--green)}
    .badge-paused{background:rgba(245,158,11,.15);color:var(--amber)}
    .badge-done{background:rgba(100,116,139,.15);color:var(--muted)}
    .project-due{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
    .project-due.overdue{color:var(--red)}
    .project-members{display:flex;margin-left:auto}
    .member-av{width:22px;height:22px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:white;border:1.5px solid var(--surface);margin-left:-5px}
    .member-av:first-child{margin-left:0}
    .project-cols-preview{display:flex;gap:4px;flex-wrap:wrap}
    .col-preview-chip{font-size:10px;padding:2px 7px;border-radius:3px;color:white;font-weight:500}
    .project-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--muted);font-size:13px}
    .project-empty i{font-size:40px;color:var(--border)}

    /* ── KANBAN ── */
    .kanban-header{padding:12px 20px;border-bottom:0.5px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;align-items:center;gap:10px}
    .back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer;background:transparent;border:none;font-family:'DM Sans',sans-serif;padding:5px 0}
    .back-btn:hover{color:var(--text)}
    .back-btn i{font-size:15px}
    .kanban-project-name{font-size:15px;font-weight:600;flex:1}
    .kanban-area{flex:1;overflow-x:auto;padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
    .kanban-area::-webkit-scrollbar{height:5px}
    .kanban-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    .k-col{flex-shrink:0;width:272px;display:flex;flex-direction:column}
    .k-col-head{background:var(--surface2);border:0.5px solid var(--border);border-radius:9px 9px 0 0;border-bottom:none;padding:10px 12px;display:flex;align-items:center;gap:8px}
    .k-col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .k-col-name-input{font-size:13px;font-weight:500;flex:1;background:transparent;border:none;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;min-width:0}
    .k-col-name-input:focus{background:rgba(255,255,255,.06);border-radius:4px;padding:1px 4px;cursor:text}
    .k-col-n{font-size:11px;color:var(--muted2);background:var(--border2);padding:1px 7px;border-radius:10px;flex-shrink:0}
    .k-col-actions{display:flex;gap:2px}
    .k-col-action-btn{width:22px;height:22px;border-radius:4px;border:none;background:transparent;color:var(--muted2);cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .1s}
    .k-col-head:hover .k-col-action-btn{opacity:1}
    .k-col-action-btn:hover{background:var(--border2);color:var(--text)}
    .k-col-action-btn i{font-size:13px}
    .k-col-body{background:rgba(13,15,20,.5);border:0.5px solid var(--border);border-top:none;border-radius:0 0 9px 9px;padding:7px;min-height:80px;display:flex;flex-direction:column;gap:5px}
    .k-col-body.drag-over{border-color:var(--accent);background:rgba(14,165,233,.04)}
    .k-col-add{width:100%;background:transparent;border:0.5px dashed var(--border2);border-radius:6px;padding:7px;font-size:12px;color:var(--muted2);font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
    .k-col-add:hover{border-color:var(--accent);color:var(--accent)}
    .add-col-btn{flex-shrink:0;width:200px;border:1.5px dashed var(--border2);border-radius:9px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:13px;color:var(--muted2);cursor:pointer;min-height:60px;align-self:flex-start;padding:12px;transition:all .15s;background:transparent;font-family:'DM Sans',sans-serif}
    .add-col-btn:hover{border-color:var(--accent);color:var(--accent)}

    /* Cards do kanban */
    .k-card{background:var(--surface2);border:0.5px solid var(--border);border-radius:8px;padding:10px 11px;cursor:pointer;transition:border-color .15s,transform .1s;user-select:none}
    .k-card:hover{border-color:var(--accent);transform:translateY(-1px)}
    .k-card.dragging{opacity:.4}
    .k-card-title{font-size:13px;font-weight:500;line-height:1.35;margin-bottom:7px}
    .k-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .k-card-tag{font-size:10px;padding:2px 6px;border-radius:3px;font-weight:500}
    .k-card-due{font-size:11px;color:var(--muted2);display:flex;align-items:center;gap:3px;margin-left:auto}
    .k-card-due.overdue{color:var(--red)}
    .k-card-due.soon{color:var(--amber)}
    .k-card-due i{font-size:12px}
    .k-card-av{width:20px;height:20px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:white}

    /* ── MODAL PROJETO ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-overlay.open{opacity:1;pointer-events:auto}
    .modal{background:var(--surface);border:0.5px solid var(--border);border-radius:13px;width:100%;max-width:580px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;transform:scale(.97);transition:transform .2s}
    .modal-overlay.open .modal{transform:scale(1)}
    .modal-header{padding:16px 18px 12px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
    .modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;flex:1}
    .modal-close{background:transparent;border:none;cursor:pointer;color:var(--muted2);border-radius:5px;padding:4px}
    .modal-close:hover{color:var(--text);background:var(--border2)}
    .modal-close i{font-size:17px}
    .modal-body{padding:18px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px}
    .modal-footer{padding:13px 18px;border-top:0.5px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
    .f-grp{display:flex;flex-direction:column;gap:5px}
    .f-row{display:flex;gap:10px}
    .f-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
    .f-input,.f-sel{background:var(--bg);border:0.5px solid var(--border);border-radius:7px;padding:8px 11px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;width:100%;transition:border-color .2s;appearance:none}
    .f-input:focus,.f-sel:focus{border-color:var(--accent)}
    .f-textarea{background:var(--bg);border:0.5px solid var(--border);border-radius:7px;padding:9px 11px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;resize:vertical;min-height:70px;width:100%;line-height:1.5}
    .f-textarea:focus{border-color:var(--accent)}
    .btn-save{background:var(--accent);border:none;border-radius:7px;padding:8px 20px;font-size:13px;font-weight:500;color:white;font-family:'DM Sans',sans-serif;cursor:pointer}
    .btn-save:hover{background:var(--accent2)}
    .btn-danger{background:rgba(239,68,68,.1);border:0.5px solid rgba(239,68,68,.3);border-radius:7px;padding:8px 14px;font-size:13px;color:var(--red);font-family:'DM Sans',sans-serif;cursor:pointer;margin-right:auto}

    /* ── MODAL CARD ── */
    .card-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
    .card-modal-overlay.open{opacity:1;pointer-events:auto}

    /* ── SHARED ── */
    .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:30px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    #toast{position:fixed;bottom:20px;right:20px;z-index:999;background:var(--accent);color:white;padding:9px 16px;border-radius:7px;font-size:13px;font-weight:500;opacity:0;transform:translateY(6px);transition:all .22s;pointer-events:none}
    #toast.show{opacity:1;transform:translateY(0)}
    #toast.ok{background:#16a34a}
    #toast.error{background:#dc2626}

    /* ── COL COLOR PICKER ── */
    .col-color-pop{display:none;position:absolute;background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:10px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.4);flex-wrap:wrap;gap:6px;width:160px}
    .col-color-pop.open{display:flex}
    .color-swatch{width:24px;height:24px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:transform .1s}
    .color-swatch:hover{transform:scale(1.2)}
    .color-swatch.selected{border-color:white}

    /* ── KANBAN DEMANDAS ── */
    .dem-subbar { padding:10px 20px; border-bottom:0.5px solid var(--border); background:var(--surface); display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .dem-kanban { flex:1; overflow-x:auto; padding:14px 16px; display:flex; gap:12px; align-items:flex-start; min-height:0; }
    .dem-kanban::-webkit-scrollbar { height:5px; }
    .dem-kanban::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    .dem-col { flex-shrink:0; width:272px; display:flex; flex-direction:column; }
    .dem-col-head { display:flex; align-items:center; gap:8px; padding:9px 12px; background:var(--surface2); border:0.5px solid var(--border); border-radius:9px 9px 0 0; border-bottom:2px solid transparent; }
    .dem-col-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .dem-col-name { font-size:13px; font-weight:500; flex:1; }
    .dem-col-n { font-size:11px; color:var(--muted2); background:var(--border2); padding:1px 7px; border-radius:10px; }
    .dem-col-edit { width:20px; height:20px; border-radius:4px; border:none; background:transparent; color:var(--muted2); cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:all .1s; padding:0; }
    .dem-col-head:hover .dem-col-edit { opacity:1; }
    .dem-col-edit:hover { background:var(--border2); color:var(--text); }
    .dem-col-body { background:rgba(13,15,20,.5); border:0.5px solid var(--border); border-top:none; border-radius:0 0 9px 9px; padding:7px; min-height:80px; display:flex; flex-direction:column; gap:5px; }
    .dem-col-body.drag-over { border-color:var(--accent); background:rgba(14,165,233,.04); }
    .dem-col-add { width:100%; background:transparent; border:0.5px dashed var(--border2); border-radius:6px; padding:7px; font-size:12px; color:var(--muted2); font-family:'DM Sans',sans-serif; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; transition:all .15s; }
    .dem-col-add:hover { border-color:var(--accent); color:var(--accent); }
    .dem-add-col { flex-shrink:0; width:200px; border:1.5px dashed var(--border2); border-radius:9px; display:flex; align-items:center; justify-content:center; gap:7px; font-size:13px; color:var(--muted2); cursor:pointer; min-height:60px; align-self:flex-start; padding:12px; transition:all .15s; background:transparent; font-family:'DM Sans',sans-serif; }
    .dem-add-col:hover { border-color:var(--accent); color:var(--accent); }
    .dem-card { background:var(--surface2); border:0.5px solid var(--border); border-radius:8px; padding:10px 11px; cursor:pointer; transition:border-color .15s; }
    .dem-card:hover { border-color:var(--accent); }
    .dem-card.dragging { opacity:.4; }
    .dem-card-title { font-size:13px; font-weight:500; line-height:1.35; margin-bottom:7px; }
    .dem-card-meta { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .dem-prio { font-size:10px; padding:2px 7px; border-radius:4px; font-weight:600; }
    .dem-prio-low { background:rgba(100,116,139,.2); color:#94A3B8; }
    .dem-prio-medium { background:rgba(245,158,11,.2); color:#FCD34D; }
    .dem-prio-high { background:rgba(239,68,68,.2); color:#F87171; }
    .dem-prio-urgent { background:rgba(139,92,246,.2); color:#C4B5FD; }
    .dem-due { font-size:11px; color:var(--muted2); display:flex; align-items:center; gap:3px; margin-left:auto; }
    .dem-due.overdue { color:var(--red); }
    .dem-due.soon { color:var(--amber); }
    .dem-av { width:20px; height:20px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:white; }
    .dem-empty { padding:16px 0; text-align:center; font-size:12px; color:var(--muted2); }

    @media(max-width:768px){
      body{height:auto;min-height:100dvh;overflow:auto}
      .page{overflow:visible;height:auto;flex-direction:column}
      .main{overflow:visible}
      .section{overflow:visible}
      .sidebar{position:fixed;bottom:0;left:0;right:0;width:100%;height:56px;flex-direction:row;justify-content:space-around;border-right:none;border-top:0.5px solid var(--border);z-index:90;padding:0}
      .nav-sep{display:none}
      .nav-btn{width:52px;height:44px}
      .nav-btn i{font-size:20px}
      .main{padding-bottom:56px}
      .projects-grid{grid-template-columns:1fr;padding:12px}
      .kanban-area{padding:10px;gap:10px}
      .k-col{width:260px}
      .modal-overlay{align-items:flex-end;padding:0}
      .modal{border-radius:16px 16px 0 0;max-height:92vh;width:100%;max-width:100%}
      .f-row{flex-direction:column}
    }
    @media(max-width:480px){
      .topbar-name{display:none}
      .sec-title{font-size:15px}
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-mark"><i class="ti ti-car"></i></div>
    FlowDesck
  </div>
  <span class="sector-badge">🚗 Locadora</span>
  <div class="topbar-right">
    <span class="topbar-name" id="topName"></span>
    <div class="topbar-av" id="topAvatar">?</div>
    <button class="icon-btn" onclick="handleSignOut()"><i class="ti ti-logout"></i></button>
  </div>
</div>

<div class="page">
  <!-- SIDEBAR NAV -->
  <nav class="sidebar">
    <button class="nav-btn active" id="nav-projetos" title="Projetos" onclick="switchSection('projetos',this)">
      <i class="ti ti-layout-grid"></i>
    </button>
    <button class="nav-btn" id="nav-demandas" title="Demandas" onclick="switchSection('demandas',this)">
      <i class="ti ti-layout-kanban"></i>
    </button>
    <div class="nav-sep"></div>
    <button class="nav-btn" title="Início" onclick="window.location.href='./index.html'">
      <i class="ti ti-home"></i>
    </button>
  </nav>

  <!-- MAIN -->
  <div class="main">

    <!-- ── SEÇÃO PROJETOS ── -->
    <div class="section active" id="sec-projetos">
      <div class="sec-header">
        <div class="sec-title">Projetos</div>
        <button class="btn-primary" onclick="openProjectModal(null)">
          <i class="ti ti-plus"></i> Novo projeto
        </button>
      </div>
      <div class="projects-grid" id="projectsGrid">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- ── SEÇÃO KANBAN ── -->
    <div class="section" id="sec-kanban">
      <div class="kanban-header">
        <button class="back-btn" onclick="backToProjects()">
          <i class="ti ti-arrow-left"></i> Projetos
        </button>
        <span class="kanban-project-name" id="kanbanProjectName">—</span>

async function init() {
  const { data:{ session } } = await supabase.auth.getSession();
  if (!session) { location.href='./index.html'; return; }

  if (p.first_access) { location.href='./primeiro-acesso.html'; return; }
  currentUser = { ...session.user, ...p };
  const name = p.full_name || session.user.email.split('@')[0];
  document.getElementById('topName').textContent   = name;
  document.getElementById('topAvatar').textContent = name[0].toUpperCase();

// ── NAVEGAÇÃO ─────────────────────────────────────────────────────────────────
window.switchSection = function(sec, btn) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+sec).classList.add('active');
  if (btn) btn.classList.add('active');
  else document.getElementById('nav-'+sec)?.classList.add('active');
  // Carregar demandas ao abrir a seção
  if (sec === 'demandas' && typeof loadDemandas === 'function') loadDemandas();
};

window.backToProjects = function() {
  currentProjectId = null;
  switchSection('projetos', document.getElementById('nav-projetos'));
};

// ── PROJETOS ──────────────────────────────────────────────────────────────────
async function loadProjects() {
  const { data } = await supabase.from('projects').select('*,owner:owner_id(full_name)')
    .eq('sector','locadora').order('created_at',{ascending:false});
  allProjects = data || [];
  renderProjects();
}

function renderProjects() {
  const grid = document.getElementById('projectsGrid');
  if (!allProjects.length) {
    grid.innerHTML = `<div class="project-empty"><i class="ti ti-folder-off"></i>Nenhum projeto ainda. Crie o primeiro!</div>`;
    return;
  }
  grid.innerHTML = allProjects.map(p => {
    const due = p.due_date ? new Date(p.due_date+'T12:00:00') : null;
    const today = new Date(); today.setHours(0,0,0,0);
    const overdue = due && due < today && p.status !== 'done';
    const dueStr  = due ? due.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}) : '';
    const badgeClass = p.status==='active'?'badge-active':p.status==='paused'?'badge-paused':'badge-done';
    const badgeLabel = p.status==='active'?'Ativo':p.status==='paused'?'Pausado':'Concluído';
    return `<div class="project-card" onclick="openKanban('${p.id}')">
      <div class="project-card-top">
        <div class="project-icon"><i class="ti ti-folder"></i></div>
        <div style="flex:1;min-width:0">
          <div class="project-name">${esc(p.name)}</div>
          ${p.description?`<div class="project-desc">${esc(p.description)}</div>`:''}
        </div>
        <button onclick="event.stopPropagation();openProjectModal('${p.id}')" style="background:transparent;border:none;cursor:pointer;color:var(--muted2);padding:4px;border-radius:5px" title="Editar">
          <i class="ti ti-dots-vertical" style="font-size:15px"></i>
        </button>
      </div>
      <div class="project-meta">
        <span class="project-badge ${badgeClass}">${badgeLabel}</span>
        ${due?`<span class="project-due ${overdue?'overdue':''}"><i class="ti ti-calendar" style="font-size:12px"></i>${dueStr}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

// ── MODAL PROJETO ─────────────────────────────────────────────────────────────
window.openProjectModal = async function(projectId) {
  currentProjectId = projectId || null;
  document.getElementById('projectModalTitle').textContent = projectId ? 'Editar Projeto' : 'Novo Projeto';
  document.getElementById('btnDeleteProject').style.display = projectId ? 'block' : 'none';

  if (projectId) {
    const p = allProjects.find(x=>x.id===projectId);
    if (p) {
      document.getElementById('pName').value   = p.name;
      document.getElementById('pDesc').value   = p.description||'';
      document.getElementById('pStatus').value = p.status||'active';
      document.getElementById('pDue').value    = p.due_date||'';
    }
    // Carregar colunas existentes
    const { data:cols } = await supabase.from('kanban_columns')
      .select('*').eq('project_id',projectId).order('position');
    editorCols = (cols||[]).map(c=>({id:c.id,name:c.name,color:c.color,position:c.position}));
  } else {
    ['pName','pDesc','pDue'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('pStatus').value='active';
    editorCols = [
      {id:null,name:'A Fazer',    color:'#64748B',position:0},
      {id:null,name:'Em Andamento',color:'#F59E0B',position:1},
      {id:null,name:'Concluído',  color:'#22C55E', position:2},
    ];
  }
  renderColumnsEditor();
  document.getElementById('projectModal').classList.add('open');
};

window.closeProjectModal = function() {
  document.getElementById('projectModal').classList.remove('open');
};

function renderColumnsEditor() {
  const el = document.getElementById('columnsEditor');
  el.innerHTML = editorCols.map((col,i) => `
    <div style="display:flex;align-items:center;gap:8px;background:var(--bg);border:0.5px solid var(--border);border-radius:7px;padding:7px 10px">
      <div style="position:relative">
        <div onclick="toggleColorPop(${i})" style="width:20px;height:20px;border-radius:4px;background:${col.color};cursor:pointer;flex-shrink:0"></div>
        <div id="colorPop${i}" class="col-color-pop" style="position:absolute;left:0;top:26px">
          ${COLORS.map(c=>`<div class="color-swatch ${c===col.color?'selected':''}" style="background:${c}" onclick="setColColor(${i},'${c}')"></div>`).join('')}
        </div>
      </div>
      <input value="${esc(col.name)}" oninput="editorCols[${i}].name=this.value"
        style="flex:1;background:transparent;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none"
        placeholder="Nome da coluna"/>
      <button onclick="removeColFromEditor(${i})" style="background:transparent;border:none;cursor:pointer;color:var(--muted2);padding:2px"
        ${editorCols.length<=1?'disabled':''}>
        <i class="ti ti-trash" style="font-size:14px"></i>
      </button>
    </div>`).join('');
}

window.toggleColorPop = function(i) {
  document.querySelectorAll('.col-color-pop').forEach((el,j)=>{ if(j!==i) el.classList.remove('open'); });
  document.getElementById('colorPop'+i)?.classList.toggle('open');
};
window.setColColor = function(i,color) {
  editorCols[i].color = color;
  document.getElementById('colorPop'+i)?.classList.remove('open');
  renderColumnsEditor();
};
window.addColumnToEditor = function() {
  editorCols.push({id:null,name:'Nova coluna',color:'#64748B',position:editorCols.length});
  renderColumnsEditor();
};
window.removeColFromEditor = function(i) {
  if (editorCols.length<=1) return;
  editorCols.splice(i,1);
  editorCols.forEach((c,j)=>c.position=j);
  renderColumnsEditor();
};

window.saveProject = async function() {
  const name = document.getElementById('pName').value.trim();
  if (!name) { showToast('Informe o nome','error'); return; }
  const payload = {
    name, sector:'locadora',
    description: document.getElementById('pDesc').value.trim()||null,
    status:      document.getElementById('pStatus').value,
    due_date:    document.getElementById('pDue').value||null,
  };
  let projectId = currentProjectId;
  if (projectId) {
    await supabase.from('projects').update(payload).eq('id',projectId);
  } else {
    payload.created_by = currentUser.id;
    payload.owner_id   = currentUser.id;
    const { data } = await supabase.from('projects').insert(payload).select().single();
    projectId = data.id;
  }
  // Salvar colunas
  const existingIds = editorCols.filter(c=>c.id).map(c=>c.id);
  // Deletar colunas removidas
  if (currentProjectId) {
    const { data:oldCols } = await supabase.from('kanban_columns').select('id').eq('project_id',projectId);
    const toDelete = (oldCols||[]).filter(c=>!existingIds.includes(c.id)).map(c=>c.id);
    if (toDelete.length) await supabase.from('kanban_columns').delete().in('id',toDelete);
  }
  // Upsert colunas
  for (let i=0; i<editorCols.length; i++) {
    const col = editorCols[i];
    if (col.id) {
      await supabase.from('kanban_columns').update({name:col.name,color:col.color,position:i}).eq('id',col.id);
    } else {
      await supabase.from('kanban_columns').insert({project_id:projectId,name:col.name,color:col.color,position:i});
    }
  }
  showToast('Salvo!','ok'); closeProjectModal(); await loadProjects();
  if (currentProjectId) await openKanban(projectId);
};

window.deleteProject = async function() {
  if (!currentProjectId||!confirm('Excluir este projeto e todas as suas tarefas?')) return;
  await supabase.from('projects').delete().eq('id',currentProjectId);
  showToast('Projeto excluído'); closeProjectModal(); backToProjects(); await loadProjects();
};

// ── KANBAN ─────────────────────────────────────────────────────────────────────
window.openKanban = async function(projectId) {
  currentProjectId = projectId;
  switchSection('kanban', null);
  document.getElementById('kanbanArea').innerHTML = '<div class="spinner"></div>';
  const p = allProjects.find(x=>x.id===projectId);
  document.getElementById('kanbanProjectName').textContent = p?.name||'—';
  const [{ data:cols },{ data:cards }] = await Promise.all([
    supabase.from('kanban_columns').select('*').eq('project_id',projectId).order('position'),
    supabase.from('cards').select('*,assignee:assignee_id(full_name)').eq('project_id',projectId).order('position'),
  ]);
  currentColumns = cols||[];
  currentCards   = cards||[];
  renderKanban();
};

function renderKanban() {
  const area = document.getElementById('kanbanArea');
  if (!currentColumns.length) {
    area.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;flex:1;color:var(--muted);font-size:13px;flex-direction:column;gap:10px"><i class="ti ti-columns" style="font-size:32px;color:var(--border)"></i>Nenhuma coluna. Edite o projeto para adicionar.</div>`;
    return;
  }
  area.innerHTML = currentColumns.map(col => {
    const cards = currentCards.filter(c=>c.kanban_column_id===col.id);
    return `<div class="k-col">
      <div class="k-col-head" style="border-bottom:2px solid ${col.color}">
        <div class="k-col-dot" style="background:${col.color}"></div>
        <input class="k-col-name-input" value="${esc(col.name)}" 
          title="Clique para renomear"
          onblur="renameColumn('${col.id}',this.value)"
          onkeydown="if(event.key==='Enter')this.blur()"/>
        <span class="k-col-n">${cards.length}</span>
        <div class="k-col-actions">
          <button class="k-col-action-btn" onclick="addCardToColumn('${col.id}')" title="Adicionar tarefa"><i class="ti ti-plus"></i></button>
        </div>
      </div>
      <div class="k-col-body" id="col-${col.id}" data-col="${col.id}"
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="dropCard(event,'${col.id}')">
        ${cards.map(card=>cardHTML(card,col)).join('')}
        <button class="k-col-add" onclick="addCardToColumn('${col.id}')">
          <i class="ti ti-plus" style="font-size:13px"></i> Adicionar
        </button>
      </div>
    </div>`;
  }).join('') + `
    <button class="add-col-btn" onclick="addColumnInline()">
      <i class="ti ti-plus" style="font-size:16px"></i> Nova coluna
    </button>`;

  // Drag events
  area.querySelectorAll('.k-card').forEach(el => {
    el.addEventListener('dragstart', e=>{
      e.dataTransfer.setData('cardId', el.dataset.cardId);
      el.classList.add('dragging');
    });
    el.addEventListener('dragend', ()=>el.classList.remove('dragging'));
  });
}

function cardHTML(c, col) {
  const due   = c.due_date ? new Date(c.due_date+'T12:00:00') : null;
  const today = new Date(); today.setHours(0,0,0,0);
  const diff  = due ? (due-today)/86400000 : null;
  const dueClass = diff===null?'':diff<0?'overdue':diff<=3?'soon':'';
  const dueStr   = due ? due.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}) : '';
  const assignee = c.assignee?.full_name;
  return `<div class="k-card" draggable="true" data-card-id="${c.id}" onclick="openCardModal('${c.id}')">
    <div class="k-card-title">${esc(c.title)}</div>
    <div class="k-card-meta">
      <span class="k-card-tag" style="background:${PRIO_C[c.priority]||'#64748B'}22;color:${PRIO_C[c.priority]||'#64748B'}">${PRIO[c.priority]||'—'}</span>
      ${assignee?`<div class="k-card-av" title="${esc(assignee)}">${assignee[0].toUpperCase()}</div>`:''}
      ${due?`<div class="k-card-due ${dueClass}" style="margin-left:auto"><i class="ti ti-clock"></i>${dueStr}</div>`:''}
    </div>
  </div>`;
}

// ── RENOMEAR COLUNA INLINE ──────────────────────────────────────────────────────
window.renameColumn = async function(colId, name) {
  const trimmed = name.trim();
  if (!trimmed) return;
  await supabase.from('kanban_columns').update({name:trimmed}).eq('id',colId);
  const col = currentColumns.find(c=>c.id===colId);
  if (col) col.name = trimmed;
  showToast('Coluna renomeada','ok');
};

// ── ADICIONAR COLUNA INLINE ─────────────────────────────────────────────────────
window.addColumnInline = async function() {
  const name = prompt('Nome da nova coluna:');
  if (!name?.trim()||!currentProjectId) return;
  const { data } = await supabase.from('kanban_columns').insert({
    project_id:currentProjectId, name:name.trim(),
    color: COLORS[currentColumns.length % COLORS.length],
    position: currentColumns.length,
  }).select().single();
  if (data) { currentColumns.push(data); renderKanban(); showToast('Coluna criada!','ok'); }
};

// ── DRAG & DROP ─────────────────────────────────────────────────────────────────
window.dropCard = async function(e, colId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const cardId = e.dataTransfer.getData('cardId');
  if (!cardId) return;
  await supabase.from('cards').update({kanban_column_id:colId}).eq('id',cardId);
  const card = currentCards.find(c=>c.id===cardId);
  if (card) { card.kanban_column_id = colId; renderKanban(); showToast('Movido!','ok'); }
};

// ── MODAL CARD ──────────────────────────────────────────────────────────────────
window.addCardToColumn = function(colId) { openCardModal(null, colId); };
window.openCardModal   = function(cardId, defaultColId) {
  currentCardId = cardId||null;
  document.getElementById('cardModalTitle').textContent = cardId ? 'Editar tarefa' : 'Nova tarefa';
  document.getElementById('btnDeleteCard').style.display = cardId ? 'block' : 'none';
  // Preencher select de colunas
  document.getElementById('cColumn').innerHTML = currentColumns.map(c=>
    `<option value="${c.id}">${esc(c.name)}</option>`).join('');
  if (cardId) {
    const c = currentCards.find(x=>x.id===cardId);
    if (c) {
      document.getElementById('cTitle').value    = c.title;
      document.getElementById('cColumn').value   = c.kanban_column_id||'';
      document.getElementById('cPrio').value     = c.priority||'medium';
      document.getElementById('cDue').value      = c.due_date||'';
      document.getElementById('cDesc').value     = c.description||'';
      document.getElementById('cAssignee').value = c.assignee_id||'';
    }
  } else {
    ['cTitle','cDue','cDesc'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('cPrio').value     = 'medium';
    document.getElementById('cAssignee').value = '';
    if (defaultColId) document.getElementById('cColumn').value = defaultColId;
  }
  document.getElementById('cardModal').classList.add('open');
};
window.closeCardModal = function() { document.getElementById('cardModal').classList.remove('open'); currentCardId=null; };
window.saveCard = async function() {
  const title = document.getElementById('cTitle').value.trim();
  if (!title) { showToast('Informe o título','error'); return; }
  const payload = {
    title, sector:'locadora', project_id:currentProjectId,
    kanban_column_id: document.getElementById('cColumn').value||null,
    priority:         document.getElementById('cPrio').value,
    due_date:         document.getElementById('cDue').value||null,
    description:      document.getElementById('cDesc').value.trim()||null,
    assignee_id:      document.getElementById('cAssignee').value||null,
    labels:[], column_id:'custom',
  };
  if (currentCardId) {
    const { error } = await supabase.from('cards').update(payload).eq('id',currentCardId);
    if (error) { showToast('Erro: '+error.message,'error'); return; }
  } else {
    payload.created_by = currentUser.id;
    payload.position   = currentCards.filter(c=>c.kanban_column_id===payload.kanban_column_id).length;
    const { error } = await supabase.from('cards').insert(payload);
    if (error) { showToast('Erro: '+error.message,'error'); return; }
  }
  showToast('Salvo!','ok'); closeCardModal(); await openKanban(currentProjectId);
};
window.deleteCard = async function() {
  if (!currentCardId||!confirm('Excluir esta tarefa?')) return;
  await supabase.from('cards').delete().eq('id',currentCardId);
  showToast('Excluída'); closeCardModal(); await openKanban(currentProjectId);
};

async function loadUsers() {
  const { data } = await supabase.from('profiles').select('id,full_name').eq('active',true).order('full_name');
  allUsers = data||[];
  const sel = document.getElementById('cAssignee');
  if (sel) sel.innerHTML = '<option value="">Nenhum</option>' + allUsers.map(u=>`<option value="${u.id}">${esc(u.full_name)}</option>`).join('');
  const demSel = document.getElementById('demAssignee');
  if (demSel) demSel.innerHTML = '<option value="">Nenhum</option>' + allUsers.map(u=>`<option value="${u.id}">${esc(u.full_name)}</option>`).join('');
}

// ── UTILS ──────────────────────────────────────────────────────────────────────
window.handleSignOut = async ()=>{ await supabase.auth.signOut(); location.href='./index.html'; };
// ── DEMANDAS LOCADORA ────────────────────────────────────────────────────────
const DEM_COLORS = ['#64748B','#F59E0B','#3B82F6','#22C55E','#EF4444','#8B5CF6','#06B6D4','#F97316'];
let demCols = [], demCards = [], currentDemId = null;

async function loadDemCols() {
  const { data } = await supabase.from('demand_columns')
    .select('*').eq('sector','locadora').order('position');
  demCols = data || [];
  if (currentUser?.role === 'admin') {
    document.getElementById('btnDemCols').style.display = 'flex';
  }
  const sel = document.getElementById('demCol');
  if (sel) sel.innerHTML = demCols.map(c=>`<option value="${c.id}">${escL(c.name)}</option>`).join('');
}

async function loadDemandas() {
  await loadDemCols();
  const { data } = await supabase.from('cards')
    .select('*,assignee:assignee_id(full_name)')
    .eq('sector','locadora').not('demand_column_id','is',null).order('position');
  demCards = data || [];
  renderDemandas();
}

function renderDemandas() {
  const area = document.getElementById('demKanban');
  if (!area) return;
  area.innerHTML = '';
  demCols.forEach(col => {
    const cards = demCards.filter(c => c.demand_column_id === col.id);
    const div = document.createElement('div');
    div.className = 'dem-col';
    div.innerHTML = `
      <div class="dem-col-head" style="border-bottom-color:${col.color}">
        <div class="dem-col-dot" style="background:${col.color}"></div>
        <span class="dem-col-name">${escL(col.name)}</span>
        <span class="dem-col-n">${cards.length}</span>
        ${currentUser?.role==='admin'?`<button class="dem-col-edit" onclick="event.stopPropagation();editDemColInline('${col.id}',this)" title="Renomear"><i class="ti ti-pencil" style="font-size:11px"></i></button>`:''}
      </div>
      <div class="dem-col-body" id="demc-${col.id}" data-col="${col.id}">
        ${cards.length===0?'<div class="dem-empty">Sem demandas</div>':cards.map(demCardHTML).join('')}
        <button class="dem-col-add" onclick="openDemModal(null,'${col.id}')"><i class="ti ti-plus" style="font-size:12px"></i> Adicionar</button>
      </div>`;
    area.appendChild(div);
    const body = div.querySelector('.dem-col-body');
    body.addEventListener('dragover', e=>{e.preventDefault();body.classList.add('drag-over');});
    body.addEventListener('dragleave', ()=>body.classList.remove('drag-over'));
    body.addEventListener('drop', e=>{
      e.preventDefault(); body.classList.remove('drag-over');
      const id = e.dataTransfer.getData('demId');
      if (id) moveDemCard(id, col.id);
    });
  });
  if (currentUser?.role === 'admin') {
    const btn = document.createElement('button');
    btn.className = 'dem-add-col';
    btn.innerHTML = '<i class="ti ti-plus" style="font-size:15px"></i> Nova coluna';
    btn.onclick = () => addDemCol();
    area.appendChild(btn);
  }
}

function demCardHTML(card) {
  const prio = {low:'Baixa',medium:'Média',high:'Alta',urgent:'Urgente'};
  const due = card.due_date ? new Date(card.due_date+'T12:00:00') : null;
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = due ? (due-today)/86400000 : null;
  const dueClass = diff===null?'':diff<0?'overdue':diff<=3?'soon':'';
  const dueStr = due ? due.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}) : '';
  const assignee = card.assignee?.full_name;
  return `<div class="dem-card" draggable="true"
    ondragstart="event.dataTransfer.setData('demId','${card.id}');this.classList.add('dragging')"
    ondragend="this.classList.remove('dragging')"
    onclick="openDemModal('${card.id}')">
    <div class="dem-card-title">${escL(card.title)}</div>
    <div class="dem-card-meta">
      <span class="dem-prio dem-prio-${card.priority||'medium'}">${prio[card.priority]||'Média'}</span>
      ${assignee?`<div class="dem-av" title="${escL(assignee)}">${assignee[0].toUpperCase()}</div>`:''}
      ${due?`<div class="dem-due ${dueClass}" style="margin-left:auto"><i class="ti ti-calendar" style="font-size:11px"></i>${dueStr}</div>`:''}
    </div>
  </div>`;
}

async function moveDemCard(id, colId) {
  await supabase.from('cards').update({demand_column_id:colId}).eq('id',id);
  const card = demCards.find(c=>c.id===id);
  if (card) { card.demand_column_id = colId; renderDemandas(); }
  showToast('Movido','ok');
}

// Modal demanda
window.openDemModal = function(cardId, defaultColId) {
  currentDemId = cardId||null;
  document.getElementById('demModalTitle').textContent = cardId ? 'Editar Demanda' : 'Nova Demanda';
  document.getElementById('btnDelDem').style.display = cardId ? 'block' : 'none';
  if (!cardId) {
    ['demTitle','demDesc','demDue'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    document.getElementById('demPrio').value='medium';
    document.getElementById('demAssignee').value='';
    if (defaultColId) document.getElementById('demCol').value = defaultColId;
    else if (demCols[0]) document.getElementById('demCol').value = demCols[0].id;
  } else {
    const card = demCards.find(c=>c.id===cardId);
    if (card) {
      document.getElementById('demTitle').value = card.title||'';
      document.getElementById('demCol').value   = card.demand_column_id||'';
      document.getElementById('demPrio').value  = card.priority||'medium';
      document.getElementById('demDue').value   = card.due_date||'';
      document.getElementById('demDesc').value  = card.description||'';
      document.getElementById('demAssignee').value = card.assignee_id||'';
    }
  }
  document.getElementById('demandaModal').classList.add('open');
};
window.closeDemModal = function() {
  document.getElementById('demandaModal').classList.remove('open');
  currentDemId = null;
};
window.saveDemanda = async function() {
  const title = document.getElementById('demTitle').value.trim();
  if (!title) { showToast('Informe o título','error'); return; }
  const payload = {
    title, sector:'locadora',
    demand_column_id: document.getElementById('demCol').value||null,
    priority:   document.getElementById('demPrio').value,
    due_date:   document.getElementById('demDue').value||null,
    description:document.getElementById('demDesc').value.trim()||null,
    assignee_id:document.getElementById('demAssignee').value||null,
    labels: [],
  };
  if (currentDemId) {
    await supabase.from('cards').update(payload).eq('id',currentDemId);
  } else {
    payload.created_by = currentUser.id;
    payload.position   = demCards.length;
    await supabase.from('cards').insert(payload);
  }
  showToast('Salvo!','ok'); closeDemModal(); await loadDemandas();
};
window.deleteDemanda = async function() {
  if (!currentDemId||!confirm('Excluir esta demanda?')) return;
  await supabase.from('cards').delete().eq('id',currentDemId);
  showToast('Excluída'); closeDemModal(); await loadDemandas();
};

// Gerenciar colunas (admin)
window.openDemColManager = function() { renderDemColList(); document.getElementById('demColManagerModal').classList.add('open'); };
window.closeDemColManager = function() { document.getElementById('demColManagerModal').classList.remove('open'); };

function renderDemColList() {
  const DEM_COL_COLORS = ['#64748B','#F59E0B','#3B82F6','#22C55E','#EF4444','#8B5CF6','#06B6D4','#F97316'];
  document.getElementById('demColList').innerHTML = demCols.map((col,i)=>`
    <div style="display:flex;align-items:center;gap:8px;background:var(--bg);border:0.5px solid var(--border);border-radius:7px;padding:8px 10px">
      <div style="position:relative">
        <div onclick="toggleDemColPop('dcp-${col.id}')" style="width:18px;height:18px;border-radius:4px;background:${col.color};cursor:pointer;flex-shrink:0"></div>
        <div id="dcp-${col.id}" style="display:none;position:absolute;left:0;top:24px;background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:8px;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,.5);flex-wrap:wrap;gap:5px;width:150px">
          ${DEM_COL_COLORS.map(clr=>`<div onclick="setDemColColor('${col.id}','${clr}')" style="width:22px;height:22px;border-radius:4px;background:${clr};cursor:pointer;border:2px solid ${clr===col.color?'#fff':'transparent'}"></div>`).join('')}
        </div>
      </div>
      <input value="${escL(col.name)}" style="flex:1;background:transparent;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none"
        onblur="saveDemColName('${col.id}',this.value)"
        onkeydown="if(event.key==='Enter')this.blur()"/>
      <button onclick="moveDemColUp('${col.id}')" ${i===0?'disabled style="opacity:.3"':''} style="background:transparent;border:none;cursor:pointer;color:var(--muted2);padding:2px"><i class="ti ti-chevron-up" style="font-size:13px"></i></button>
      <button onclick="moveDemColDown('${col.id}')" ${i===demCols.length-1?'disabled style="opacity:.3"':''} style="background:transparent;border:none;cursor:pointer;color:var(--muted2);padding:2px"><i class="ti ti-chevron-down" style="font-size:13px"></i></button>
      <button onclick="deleteDemCol('${col.id}')" style="background:transparent;border:none;cursor:pointer;color:var(--muted2);padding:2px"><i class="ti ti-trash" style="font-size:13px"></i></button>
    </div>`).join('');
}
window.toggleDemColPop = function(id) {
  document.querySelectorAll('[id^="dcp-"]').forEach(el=>{ if(el.id!==id)el.style.display='none'; });
  const el=document.getElementById(id); el.style.display=el.style.display==='flex'?'none':'flex';
};
window.setDemColColor = async function(colId,color) {
  await supabase.from('demand_columns').update({color}).eq('id',colId);
  document.getElementById('dcp-'+colId).style.display='none';
  await loadDemandas(); renderDemColList();
};
window.saveDemColName = async function(colId,name) {
  if (!name?.trim()) return;
  await supabase.from('demand_columns').update({name:name.trim()}).eq('id',colId);
  await loadDemandas(); showToast('Renomeado','ok');
};
window.moveDemColUp = async function(colId) {
  const idx=demCols.findIndex(c=>c.id===colId); if(idx<=0) return;
  await supabase.from('demand_columns').update({position:idx}).eq('id',demCols[idx-1].id);
  await supabase.from('demand_columns').update({position:idx-1}).eq('id',colId);
  await loadDemandas(); renderDemColList();
};
window.moveDemColDown = async function(colId) {
  const idx=demCols.findIndex(c=>c.id===colId); if(idx>=demCols.length-1) return;
  await supabase.from('demand_columns').update({position:idx}).eq('id',demCols[idx+1].id);
  await supabase.from('demand_columns').update({position:idx+1}).eq('id',colId);
  await loadDemandas(); renderDemColList();
};
window.addDemCol = async function() {
  const name=prompt('Nome da nova coluna:'); if(!name?.trim()) return;
  await supabase.from('demand_columns').insert({sector:'locadora',name:name.trim(),color:DEM_COLORS[demCols.length%DEM_COLORS.length],position:demCols.length});
  await loadDemandas(); renderDemColList(); showToast('Coluna criada!','ok');
};
window.deleteDemCol = async function(colId) {
  const n=demCards.filter(c=>c.demand_column_id===colId).length;
  if(n>0){showToast(`Mova as ${n} demanda(s) antes`,'error');return;}
  const col=demCols.find(c=>c.id===colId);
  if(!confirm(`Excluir coluna "${col?.name}"?`)) return;
  await supabase.from('demand_columns').delete().eq('id',colId);
  await loadDemandas(); renderDemColList(); showToast('Excluída');
};
window.editDemColInline = function(colId,btn) {
  const nameEl=btn.closest('.dem-col-head').querySelector('.dem-col-name');
  const old=nameEl.textContent;
  nameEl.contentEditable='true'; nameEl.focus();
  const r=document.createRange(); r.selectNodeContents(nameEl);
  window.getSelection().removeAllRanges(); window.getSelection().addRange(r);
  const finish=()=>{
    nameEl.contentEditable='false';
    const n=nameEl.textContent.trim();
    if(n&&n!==old) saveDemColName(colId,n); else nameEl.textContent=old;
    nameEl.removeEventListener('blur',finish); nameEl.removeEventListener('keydown',onKey);
  };
  const onKey=e=>{if(e.key==='Enter'){e.preventDefault();nameEl.blur();}if(e.key==='Escape'){nameEl.textContent=old;nameEl.blur();}};
  nameEl.addEventListener('blur',finish); nameEl.addEventListener('keydown',onKey);
};
// Fechar color pops ao clicar fora
document.addEventListener('click',e=>{
  if(!e.target.closest('[id^="dcp-"]')&&!e.target.closest('[onclick^="toggleDemColPop"]'))
    document.querySelectorAll('[id^="dcp-"]').forEach(el=>el.style.display='none');
});
function escL(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function showToast(msg,type='ok'){const el=document.getElementById('toast');el.textContent=msg;el.className='show '+(type==='error'?'error':type==='ok'?'ok':'');setTimeout(()=>{el.className=''},3000)}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeProjectModal();closeCardModal();}});
document.addEventListener('click',e=>{if(!e.target.closest('.col-color-pop')&&!e.target.closest('[onclick^="toggleColorPop"]'))document.querySelectorAll('.col-color-pop').forEach(p=>p.classList.remove('open'));});

init();
</script>
</body>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlowDesck — Imóveis Leilão</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0D0D0F; --surface:#111114; --surface2:#18181B;
      --border:#27272A; --border2:#3F3F46; --text:#FAFAFA;
      --text2:#A1A1AA; --text3:#71717A; --text4:#52525B;
      --accent:#D97706; --accent2:#B45309;
      --blue:#3B82F6; --green:#22C55E; --red:#EF4444;
      --amber:#F59E0B; --purple:#8B5CF6;
    }
    html,body { height:100%; }
    body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); display:flex; flex-direction:column; height:100vh; overflow:hidden; font-size:13px; }

    /* TOPBAR */
    .topbar { height:48px; background:var(--surface); border-bottom:0.5px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:10px; flex-shrink:0; }
    .tb-logo { width:24px; height:24px; background:var(--accent); border-radius:6px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .tb-logo i { font-size:13px; color:#fff; }
    .tb-name { font-size:14px; font-weight:500; }
    .tb-sep { color:var(--border2); }
    .tb-sec { font-size:12px; color:var(--text3); }
    .tb-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
    .tb-av { width:26px; height:26px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:600; color:#fff; }
    .tb-name2 { font-size:12px; color:var(--text2); }
    .icon-btn { width:30px; height:30px; border-radius:6px; border:0.5px solid var(--border); background:transparent; color:var(--text3); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; }
    .icon-btn:hover { background:var(--surface2); color:var(--text); }
    .icon-btn i { font-size:15px; }

    /* LAYOUT */
    .layout { display:flex; flex:1; overflow:hidden; }

    /* SIDEBAR */
    .sidebar { width:220px; background:var(--surface); border-right:0.5px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow:hidden; }
    .sb-search { padding:10px 12px; border-bottom:0.5px solid var(--border); }
    .sb-search-input { width:100%; background:var(--surface2); border:0.5px solid var(--border); border-radius:6px; padding:6px 10px 6px 30px; font-size:12px; color:var(--text); font-family:'Inter',sans-serif; outline:none; }
    .sb-search-input::placeholder { color:var(--text4); }
    .sb-search-wrap { position:relative; }
    .sb-search-wrap i { position:absolute; left:8px; top:50%; transform:translateY(-50%); font-size:13px; color:var(--text4); }
    .sb-body { flex:1; overflow-y:auto; padding:6px 0; }
    .sb-body::-webkit-scrollbar { width:3px; }
    .sb-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    .group-row { width:100%; display:flex; align-items:center; gap:7px; padding:7px 10px; border:none; background:transparent; cursor:pointer; text-align:left; }
    .group-row:hover { background:var(--surface2); }
    .group-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .group-name { font-size:12px; font-weight:500; color:var(--text2); flex:1; }
    .group-count { font-size:10px; color:var(--text4); background:var(--border); padding:1px 5px; border-radius:6px; }
    .group-arrow { font-size:12px; color:var(--text4); transition:transform .15s; }
    .group-arrow.open { transform:rotate(90deg); }
    .sub-list { display:none; flex-direction:column; }
    .sub-list.open { display:flex; }
    .sub-btn { display:flex; align-items:center; gap:6px; padding:5px 10px 5px 24px; border:none; background:transparent; cursor:pointer; text-align:left; width:100%; border-left:2px solid transparent; transition:all .1s; }
    .sub-btn:hover { background:var(--surface2); }
    .sub-btn.active { background:rgba(217,119,6,.1); border-left-color:var(--accent); }
    .sub-btn .sl { font-size:12px; color:var(--text3); flex:1; }
    .sub-btn.active .sl { color:var(--accent); font-weight:500; }
    .sub-btn .sn { font-size:10px; color:var(--text4); }
    .sb-divider { height:0.5px; background:var(--border); margin:4px 0; }
    .sb-add-sub { display:flex; align-items:center; gap:5px; padding:5px 10px 5px 24px; font-size:11px; color:var(--text4); cursor:pointer; border:none; background:transparent; width:100%; }
    .sb-add-sub:hover { color:var(--accent); }
    .sb-footer { padding:10px 12px; border-top:0.5px solid var(--border); }
    .sb-footer-btn { width:100%; display:flex; align-items:center; gap:6px; padding:7px 10px; border:0.5px dashed var(--border2); border-radius:6px; background:transparent; color:var(--text4); cursor:pointer; font-size:11px; font-family:'Inter',sans-serif; }
    .sb-footer-btn:hover { border-color:var(--accent); color:var(--accent); }
    .sb-footer-btn i { font-size:13px; }

    /* MAIN */
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }
    .main-header { padding:10px 16px; border-bottom:0.5px solid var(--border); display:flex; align-items:center; gap:8px; background:var(--surface); flex-shrink:0; }
    .breadcrumb { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--text3); flex:1; }
    .breadcrumb i { font-size:11px; }
    .breadcrumb .cur { color:var(--text); font-weight:500; }
    .header-actions { display:flex; gap:6px; }
    .h-btn { display:flex; align-items:center; gap:4px; padding:5px 10px; border-radius:6px; border:0.5px solid var(--border); background:transparent; color:var(--text2); font-size:11px; font-family:'Inter',sans-serif; cursor:pointer; transition:all .15s; }
    .h-btn:hover { background:var(--surface2); color:var(--text); }
    .h-btn i { font-size:13px; }
    .h-btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
    .h-btn.primary:hover { background:var(--accent2); }

    /* KANBAN */
    .kanban { flex:1; display:flex; gap:10px; padding:14px; overflow-x:auto; align-items:flex-start; }
    .kanban::-webkit-scrollbar { height:5px; }
    .kanban::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

    /* COLUNA LISTA (lista de cards) */
    .k-col { flex-shrink:0; width:270px; display:flex; flex-direction:column; }
    .k-col-head { background:var(--surface); border:0.5px solid var(--border); border-radius:8px 8px 0 0; border-bottom:none; padding:10px 12px; display:flex; align-items:center; gap:8px; }
    .k-col-name { font-size:13px; font-weight:500; flex:1; }
    .k-col-n { font-size:11px; color:var(--text4); background:var(--border); padding:1px 7px; border-radius:10px; }
    .k-col-body { background:var(--surface); border:0.5px solid var(--border); border-top:none; border-radius:0 0 8px 8px; padding:6px; display:flex; flex-direction:column; gap:0; min-height:60px; }

    /* CARD ESTILO TRELLO */
    .t-card { background:var(--surface2); border:0.5px solid var(--border); border-radius:8px; margin-bottom:6px; cursor:pointer; overflow:hidden; transition:border-color .15s, transform .1s; }
    .t-card:last-child { margin-bottom:0; }
    .t-card:hover { border-color:var(--accent); transform:translateY(-1px); }
    .t-card-cover { width:100%; height:130px; object-fit:cover; display:block; background:var(--border); }
    .t-card-cover-ph { width:100%; height:100px; background:var(--border); display:flex; align-items:center; justify-content:center; }
    .t-card-cover-ph i { font-size:28px; color:var(--text4); }
    .t-card-body { padding:8px 10px 10px; }
    .t-card-labels { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:6px; }
    .t-label { height:8px; border-radius:4px; min-width:40px; display:inline-block; cursor:pointer; transition:opacity .1s; }
    .t-label:hover { opacity:.8; }
    .t-card-title { font-size:13px; font-weight:400; line-height:1.4; color:var(--text); margin-bottom:8px; }
    .t-card-footer { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .t-due { display:flex; align-items:center; gap:4px; font-size:11px; padding:2px 6px; border-radius:4px; }
    .t-due i { font-size:12px; }
    .t-due.ok     { color:var(--text3); }
    .t-due.soon   { background:rgba(245,158,11,.15); color:var(--amber); }
    .t-due.overdue { background:rgba(239,68,68,.15); color:var(--red); }
    .t-due.today  { background:rgba(34,197,94,.15); color:var(--green); }
    .t-card-icons { margin-left:auto; display:flex; align-items:center; gap:6px; }
    .t-icon { display:flex; align-items:center; gap:2px; font-size:11px; color:var(--text4); }
    .t-icon i { font-size:13px; }
    .t-members { display:flex; }
    .t-member-av { width:22px; height:22px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:600; color:#fff; border:1.5px solid var(--surface2); margin-left:-4px; }
    .t-member-av:first-child { margin-left:0; }

    /* EMPTY */
    .k-empty { text-align:center; padding:24px 12px; color:var(--text4); font-size:12px; }

    /* ADD CARD */
    .k-add { width:100%; display:flex; align-items:center; gap:5px; padding:8px 10px; border:none; background:transparent; color:var(--text4); font-size:12px; font-family:'Inter',sans-serif; cursor:pointer; border-radius:6px; transition:all .15s; }
    .k-add:hover { background:var(--surface2); color:var(--text2); }
    .k-add i { font-size:14px; }

    /* MODAL ESTILO TRELLO */
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:300; display:flex; justify-content:center; align-items:flex-start; padding:48px 20px; overflow-y:auto; opacity:0; pointer-events:none; transition:opacity .2s; }
    .modal-bg.open { opacity:1; pointer-events:auto; }
    .modal-wrap { display:flex; gap:8px; width:100%; max-width:820px; position:relative; }
    .modal-main { flex:1; background:var(--surface2); border-radius:12px; overflow:hidden; }
    .modal-cover-area { width:100%; height:200px; background:var(--border); position:relative; overflow:hidden; }
    .modal-cover-area img { width:100%; height:100%; object-fit:cover; display:block; }
    .modal-cover-ph { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
    .modal-cover-ph i { font-size:48px; color:var(--text4); }
    .modal-cover-actions { position:absolute; bottom:8px; right:8px; display:flex; gap:6px; }
    .modal-cover-btn { background:rgba(0,0,0,.6); border:none; border-radius:5px; padding:5px 10px; font-size:11px; color:#fff; cursor:pointer; display:flex; align-items:center; gap:4px; font-family:'Inter',sans-serif; }
    .modal-cover-btn i { font-size:13px; }
    .modal-close-btn { position:absolute; top:8px; right:8px; width:28px; height:28px; border-radius:50%; background:rgba(0,0,0,.6); border:none; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .modal-close-btn i { font-size:15px; }
    .modal-content { padding:16px 20px 20px; }
    .modal-labels-row { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:10px; }
    .modal-label { height:8px; border-radius:4px; min-width:50px; cursor:pointer; }
    .modal-title { font-size:18px; font-weight:500; line-height:1.3; color:var(--text); margin-bottom:4px; border:none; background:transparent; width:100%; outline:none; font-family:'Inter',sans-serif; resize:none; }
    .modal-list-tag { font-size:12px; color:var(--text3); margin-bottom:16px; display:flex; align-items:center; gap:5px; }
    .modal-list-tag i { font-size:13px; }
    .modal-section { margin-bottom:16px; }
    .modal-section-head { display:flex; align-items:center; gap:8px; margin-bottom:8px; font-size:13px; font-weight:500; color:var(--text2); }
    .modal-section-head i { font-size:16px; }
    .modal-meta-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
    .modal-meta-item { background:var(--surface); border:0.5px solid var(--border); border-radius:8px; padding:10px 12px; }
    .modal-meta-label { font-size:10px; color:var(--text4); text-transform:uppercase; letter-spacing:.8px; margin-bottom:4px; }
    .modal-meta-val { font-size:13px; font-weight:500; }
    .modal-meta-val.overdue { color:var(--red); }
    .modal-meta-val.soon { color:var(--amber); }
    .modal-desc { background:var(--surface); border:0.5px solid var(--border); border-radius:8px; padding:12px; font-size:13px; color:var(--text2); line-height:1.6; white-space:pre-wrap; cursor:pointer; }
    .modal-desc:hover { border-color:var(--border2); }
    .modal-link { display:flex; align-items:center; gap:6px; padding:8px 12px; background:var(--surface); border:0.5px solid var(--border); border-radius:8px; font-size:12px; color:var(--blue); text-decoration:none; transition:border-color .15s; }
    .modal-link:hover { border-color:var(--blue); }
    .modal-link i { font-size:14px; flex-shrink:0; }
    .modal-link span { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .img-upload-zone { border:1.5px dashed var(--border2); border-radius:8px; padding:16px; text-align:center; cursor:pointer; transition:all .2s; font-size:12px; color:var(--text4); }
    .img-upload-zone:hover { border-color:var(--accent); color:var(--accent); }
    .img-upload-zone i { font-size:24px; display:block; margin-bottom:6px; }
    .img-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:8px; }
    .img-thumb { border-radius:6px; overflow:hidden; aspect-ratio:4/3; position:relative; }
    .img-thumb img { width:100%; height:100%; object-fit:cover; }
    .img-thumb-del { position:absolute; top:3px; right:3px; width:18px; height:18px; border-radius:50%; background:rgba(0,0,0,.7); border:none; cursor:pointer; color:#fff; font-size:10px; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .15s; }
    .img-thumb:hover .img-thumb-del { opacity:1; }
    .comments-list { display:flex; flex-direction:column; gap:12px; margin-bottom:12px; }
    .comment-item { display:flex; gap:8px; }
    .comment-av { width:28px; height:28px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:#fff; flex-shrink:0; }
    .comment-body { flex:1; }
    .comment-meta { font-size:11px; margin-bottom:3px; }
    .comment-author { font-weight:500; color:var(--text2); }
    .comment-date { color:var(--text4); margin-left:6px; }
    .comment-text { background:var(--surface); border:0.5px solid var(--border); border-radius:8px; padding:8px 10px; font-size:12px; color:var(--text); line-height:1.5; }
    .comment-input-wrap { display:flex; gap:8px; }
    .comment-input { flex:1; background:var(--surface); border:0.5px solid var(--border2); border-radius:8px; padding:8px 10px; font-size:12px; color:var(--text); font-family:'Inter',sans-serif; outline:none; resize:none; min-height:40px; transition:border-color .15s; }
    .comment-input:focus { border-color:var(--accent); min-height:72px; }
    .comment-input::placeholder { color:var(--text4); }
    .modal-sidebar { width:160px; flex-shrink:0; display:flex; flex-direction:column; gap:4px; }
    .ms-section { font-size:10px; color:var(--text4); text-transform:uppercase; letter-spacing:.8px; margin:8px 0 4px; }
    .ms-btn { width:100%; display:flex; align-items:center; gap:6px; padding:6px 10px; border-radius:6px; border:0.5px solid var(--border); background:var(--surface2); color:var(--text2); font-size:12px; font-family:'Inter',sans-serif; cursor:pointer; transition:all .15s; }
    .ms-btn:hover { background:var(--surface); border-color:var(--border2); }
    .ms-btn i { font-size:14px; }

    /* Sublista form */
    .sub-form { padding:6px 10px 6px 24px; display:none; }
    .sub-form.open { display:block; }
    .sub-form input { width:100%; background:var(--surface2); border:0.5px solid var(--border2); border-radius:5px; padding:5px 8px; font-size:12px; color:var(--text); font-family:'Inter',sans-serif; outline:none; }

    /* Loading */
    .loading { display:flex; align-items:center; justify-content:center; flex:1; color:var(--text4); font-size:13px; gap:8px; }
    .loading i { font-size:20px; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Toast */
    #toast { position:fixed; bottom:20px; right:20px; z-index:999; background:#16a34a; color:#fff; padding:9px 16px; border-radius:7px; font-size:12px; opacity:0; transform:translateY(6px); transition:all .2s; pointer-events:none; }
    #toast.show { opacity:1; transform:translateY(0); }
    #toast.error { background:#dc2626; }

    /* MOBILE */
    @media(max-width:768px) {
      .sidebar { display:none; }
      .kanban { padding:10px; gap:8px; }
      .k-col { width:240px; }
      .modal-bg { padding:0; align-items:flex-end; }
      .modal-wrap { flex-direction:column; max-width:100%; }
      .modal-main { border-radius:12px 12px 0 0; }
      .modal-sidebar { width:100%; flex-direction:row; flex-wrap:wrap; padding:0 16px 16px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo" onclick="window.location.href='./index.html'"><i class="ti ti-layout-grid" aria-hidden="true"></i></div>
  <span class="tb-name">FlowDesck</span>
  <span class="tb-sep">/</span>
  <span class="tb-sec">Imóveis Leilão</span>
  <div class="tb-right">
    <span class="tb-name2" id="tbName"></span>
    <div class="tb-av" id="tbAv">?</div>
    <button class="icon-btn" title="Sair" onclick="handleSignOut()"><i class="ti ti-logout" aria-hidden="true"></i></button>
  </div>
</div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-search">
      <div class="sb-search-wrap">
        <i class="ti ti-search" aria-hidden="true"></i>
        <input class="sb-search-input" id="sbSearch" placeholder="Buscar..." oninput="filterSidebar(this.value)"/>
      </div>
    </div>
    <div class="sb-body" id="sbBody">
      <div class="loading"><i class="ti ti-loader-2" aria-hidden="true"></i> Carregando...</div>
    </div>
    <div class="sb-footer">
      <button class="sb-footer-btn" onclick="openNewGroupForm()">
        <i class="ti ti-plus" aria-hidden="true"></i> Novo grupo
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="main-header">
      <div class="breadcrumb" id="breadcrumb">
        <span>Imóveis Leilão</span>
        <i class="ti ti-chevron-right" aria-hidden="true"></i>
        <span class="cur" id="bcCur">Selecione uma lista</span>
      </div>
      <div class="header-actions">
        <button class="h-btn" id="btnEditSub" style="display:none" onclick="editCurrentSub()"><i class="ti ti-pencil" aria-hidden="true"></i> Renomear</button>
        <button class="h-btn" id="btnDelSub" style="display:none" onclick="deleteCurrentSub()"><i class="ti ti-trash" aria-hidden="true"></i></button>
        <button class="h-btn primary" id="btnNewCard" style="display:none" onclick="openNewCardModal()">
          <i class="ti ti-plus" aria-hidden="true"></i> Novo lote
        </button>
      </div>
    </div>
    <div class="kanban" id="kanbanArea">
      <div class="loading"><i class="ti ti-layout-kanban" aria-hidden="true"></i> Selecione uma sublista na sidebar</div>
    </div>
  </div>
</div>

<!-- MODAL CARD -->
<div class="modal-bg" id="cardModal">
  <div class="modal-wrap">
    <div class="modal-main">
      <div class="modal-cover-area" id="modalCoverArea">
        <div class="modal-cover-ph"><i class="ti ti-building" aria-hidden="true"></i></div>
        <button class="modal-close-btn" onclick="closeCardModal()"><i class="ti ti-x" aria-hidden="true"></i></button>
        <div class="modal-cover-actions">
          <label class="modal-cover-btn" for="coverInput"><i class="ti ti-camera" aria-hidden="true"></i> Capa</label>
          <input type="file" id="coverInput" accept="image/*" style="display:none" onchange="uploadCover(this)"/>
        </div>
      </div>
      <div class="modal-content">
        <div class="modal-labels-row" id="modalLabelsRow"></div>
        <textarea class="modal-title" id="modalTitle" rows="2" placeholder="Título do imóvel..." oninput="autoResize(this)"></textarea>
        <div class="modal-list-tag"><i class="ti ti-layout-list" aria-hidden="true"></i><span id="modalListTag">—</span></div>

        <div class="modal-meta-grid" id="modalMetaGrid" style="margin-bottom:16px"></div>

        <div class="modal-section">
          <div class="modal-section-head"><i class="ti ti-align-left" aria-hidden="true"></i> Descrição</div>
          <div class="modal-desc" id="modalDesc" onclick="editDesc()">Clique para editar...</div>
          <textarea id="modalDescEdit" style="display:none;width:100%;background:var(--surface);border:0.5px solid var(--accent);border-radius:8px;padding:12px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;outline:none;resize:vertical;min-height:80px;line-height:1.6;" placeholder="Descrição..."></textarea>
          <div id="descActions" style="display:none;margin-top:6px;display:flex;gap:6px;display:none">
            <button class="h-btn primary" onclick="saveDesc()">Salvar</button>
            <button class="h-btn" onclick="cancelDesc()">Cancelar</button>
          </div>
        </div>

        <div class="modal-section" id="modalLinkSection" style="display:none">
          <div class="modal-section-head"><i class="ti ti-link" aria-hidden="true"></i> Link do leilão</div>
          <a class="modal-link" id="modalLinkEl" href="#" target="_blank" rel="noopener">
            <i class="ti ti-external-link" aria-hidden="true"></i>
            <span id="modalLinkText">—</span>
          </a>
        </div>

        <div class="modal-section">
          <div class="modal-section-head"><i class="ti ti-photo" aria-hidden="true"></i> Fotos <span id="photoCount" style="font-size:11px;color:var(--text4);font-weight:400"></span></div>
          <div class="img-grid" id="imgGrid"></div>
          <label class="img-upload-zone" for="imgInput">
            <i class="ti ti-upload" aria-hidden="true"></i>
            Clique para adicionar fotos
          </label>
          <input type="file" id="imgInput" accept="image/*" multiple style="display:none" onchange="uploadImages(this)"/>
        </div>

        <div class="modal-section">
          <div class="modal-section-head"><i class="ti ti-message" aria-hidden="true"></i> Comentários e atividade</div>
          <div class="comments-list" id="commentsList"></div>
          <div class="comment-input-wrap">
            <div class="comment-av" id="commentAv">?</div>
            <textarea class="comment-input" id="commentInput" placeholder="Escrever um comentário..." rows="1" oninput="autoResize(this)"></textarea>
          </div>
          <div style="margin-top:6px;display:flex;gap:6px;" id="commentActions" style="display:none">
            <button class="h-btn primary" onclick="postComment()">Salvar</button>
            <button class="h-btn" onclick="document.getElementById('commentInput').value=''">Cancelar</button>
          </div>

      </div>

    <div class="modal-sidebar">
      <div class="ms-section">Adicionar ao card</div>
      <button class="ms-btn" onclick="openLabelEditor()"><i class="ti ti-tag" aria-hidden="true"></i> Etiquetas</button>
      <button class="ms-btn" onclick="openMemberPicker()"><i class="ti ti-user-plus" aria-hidden="true"></i> Membros</button>
      <button class="ms-btn" onclick="openDuePicker()"><i class="ti ti-calendar" aria-hidden="true"></i> Data entrega</button>
      <div class="ms-section">Ações</div>
      <button class="ms-btn" onclick="openMoveCard()"><i class="ti ti-arrows-move" aria-hidden="true"></i> Mover</button>
      <button class="ms-btn" onclick="deleteCurrentCard()" style="color:var(--red)"><i class="ti ti-trash" aria-hidden="true"></i> Excluir</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient(
  'https://ooejtjqxobfrletpssjm.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vZWp0anF4b2JmcmxldHBzc2ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTIzMzY4ODMsImV4cCI6MjA2NzkxMjg4M30.wTCrQfXVD6q47r-vN4iEsPkwaGV0qM-oTGnQpx525Mo'
);

let currentUser = null;
let allGrupos = [], allSublistas = [], currentSubId = null, currentCard = null;

// ── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  const { data:{ session } } = await supabase.auth.getSession();
  if (!session) { location.href = './index.html'; return; }
  const { data: profile } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
  if (!profile?.active) { await supabase.auth.signOut(); location.href = './index.html'; return; }
  if (profile.first_access) { location.href = './primeiro-acesso.html'; return; }
  currentUser = { ...session.user, ...profile };
  const name = profile.full_name || session.user.email.split('@')[0];
  document.getElementById('tbName').textContent = name;
  document.getElementById('tbAv').textContent = name[0].toUpperCase();
  document.getElementById('commentAv').textContent = name[0].toUpperCase();
  await loadSidebar();
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
async function loadSidebar() {
  const { data: grupos } = await supabase.from('leilao_grupos').select('*').order('posicao');
  const { data: subs }   = await supabase.from('leilao_sublistas').select('*').order('posicao');
  const { data: counts } = await supabase.from('leilao_cards').select('sublista_id');
  allGrupos = grupos || [];
  allSublistas = subs || [];
  const countMap = {};
  (counts || []).forEach(c => { countMap[c.sublista_id] = (countMap[c.sublista_id]||0)+1; });
  renderSidebar(countMap);
}

function renderSidebar(countMap = {}) {
  const body = document.getElementById('sbBody');
  if (!allGrupos.length) { body.innerHTML = '<div style="padding:16px;font-size:12px;color:var(--text4);text-align:center">Nenhum grupo</div>'; return; }
  body.innerHTML = allGrupos.map(g => {
    const subs = allSublistas.filter(s => s.grupo_id === g.id);
    const totalG = subs.reduce((s,sub) => s+(countMap[sub.id]||0), 0);
    return `
    <button class="group-row" onclick="toggleGroup('g${g.id}',this)">
      <div class="group-dot" style="background:${g.cor}"></div>
      <span class="group-name">${esc(g.nome)}</span>
      <span class="group-count">${totalG}</span>
      <i class="ti ti-chevron-right group-arrow open" id="garr_g${g.id}" aria-hidden="true"></i>
    </button>
    <div class="sub-list open" id="g${g.id}">
      ${subs.map(s => `
        <button class="sub-btn" id="sb_${s.id}" onclick="selectSub('${s.id}','${esc(g.nome)}','${esc(s.nome)}')">
          <span class="sl">${esc(s.nome)}</span>
          <span class="sn">${countMap[s.id]||0}</span>
        </button>`).join('')}
      <button class="sb-add-sub" onclick="openNewSubForm('${g.id}')">
        <i class="ti ti-plus" style="font-size:11px" aria-hidden="true"></i> Adicionar lista
      </button>
    </div>
    <div class="sb-divider"></div>`;
  }).join('');
}

window.toggleGroup = function(id, btn) {
  const list  = document.getElementById(id);
  const arrow = document.getElementById('garr_' + id);
  const open  = list.classList.contains('open');
  list.classList.toggle('open', !open);
  if (arrow) arrow.classList.toggle('open', !open);
};

window.selectSub = async function(subId, grupoNome, subNome) {
  currentSubId = subId;
  document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('sb_' + subId);
  if (btn) btn.classList.add('active');
  document.getElementById('bcCur').textContent = subNome;
  document.getElementById('breadcrumb').innerHTML = `
    <span style="color:var(--text3)">${esc(grupoNome)}</span>
    <i class="ti ti-chevron-right" style="font-size:11px" aria-hidden="true"></i>
    <span class="cur">${esc(subNome)}</span>`;
  document.getElementById('btnNewCard').style.display = 'flex';
  document.getElementById('btnEditSub').style.display = 'flex';
  document.getElementById('btnDelSub').style.display  = 'flex';
  await loadKanban(subId, subNome);
};

// ── KANBAN ────────────────────────────────────────────────────────────────────
async function loadKanban(subId, subNome) {
  const kanban = document.getElementById('kanbanArea');
  kanban.innerHTML = '<div class="loading"><i class="ti ti-loader-2 ti-spin" style="animation:spin .7s linear infinite" aria-hidden="true"></i> Carregando...</div>';
  const { data: cards } = await supabase.from('leilao_cards')
    .select('*').eq('sublista_id', subId).order('posicao');
  renderKanban(cards || [], subNome);
}

function renderKanban(cards, subNome) {
  const kanban = document.getElementById('kanbanArea');
  // Uma única coluna com todos os cards (igual ao Trello — lista única por sublista)
  const total = cards.length;
  kanban.innerHTML = `
    <div class="k-col">
      <div class="k-col-head">
        <span class="k-col-name">${esc(subNome)}</span>
        <span class="k-col-n">${total}</span>
      </div>
      <div class="k-col-body">
        ${total === 0 ? '<div class="k-empty">Sem lotes nesta lista</div>' : cards.map(c => cardHTML(c)).join('')}
        <button class="k-add" onclick="openNewCardModal()">
          <i class="ti ti-plus" aria-hidden="true"></i> Adicionar um lote
        </button>
      </div>
    </div>`;
}

function cardHTML(c) {
  const labels  = (c.labels || []);
  const images  = (c.images || []);
  const today   = new Date(); today.setHours(0,0,0,0);
  const due     = c.due_date ? new Date(c.due_date) : null;
  let dueClass  = 'ok', dueTxt = '';
  if (due) {
    const diff = (due - today) / 86400000;
    dueTxt = due.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'2-digit'});
    if (diff < 0)  dueClass = 'overdue';
    else if (diff === 0) dueClass = 'today';
    else if (diff <= 3)  dueClass = 'soon';
  }
  const coverImg = images.length ? `<img class="t-card-cover" src="${esc(images[0])}" alt="foto" loading="lazy"/>` :
    `<div class="t-card-cover-ph"><i class="ti ti-building" aria-hidden="true"></i></div>`;

  return `
    <div class="t-card" onclick='openCardModal(${JSON.stringify(c)})'>
      ${coverImg}
      <div class="t-card-body">
        ${labels.length ? `<div class="t-card-labels">${labels.map(l=>`<span class="t-label" style="background:${l.cor}" title="${esc(l.nome)}"></span>`).join('')}</div>` : ''}
        <div class="t-card-title">${esc(c.titulo)}</div>
        <div class="t-card-footer">
          ${due ? `<div class="t-due ${dueClass}"><i class="ti ti-clock" aria-hidden="true"></i>${dueTxt}</div>` : ''}
          <div class="t-card-icons">
            ${images.length > 1 ? `<div class="t-icon"><i class="ti ti-photo" aria-hidden="true"></i>${images.length}</div>` : ''}
            ${c.link_leilao ? `<div class="t-icon"><i class="ti ti-link" aria-hidden="true"></i></div>` : ''}
          </div>
        </div>
      </div>
    </div>`;
}

// ── MODAL CARD ────────────────────────────────────────────────────────────────
window.openCardModal = function(card) {
  currentCard = typeof card === 'string' ? JSON.parse(card) : card;
  const c = currentCard;
  const labels  = c.labels  || [];
  const images  = c.images  || [];
  const today   = new Date(); today.setHours(0,0,0,0);
  const due     = c.due_date ? new Date(c.due_date) : null;

  // Cover
  const coverArea = document.getElementById('modalCoverArea');
  if (images.length) {
    coverArea.innerHTML = `<img src="${esc(images[0])}" alt="capa" style="width:100%;height:100%;object-fit:cover;display:block"/>
      <button class="modal-close-btn" onclick="closeCardModal()"><i class="ti ti-x" aria-hidden="true"></i></button>
      <div class="modal-cover-actions">
        <label class="modal-cover-btn" for="coverInput"><i class="ti ti-camera" aria-hidden="true"></i> Capa</label>
        <input type="file" id="coverInput" accept="image/*" style="display:none" onchange="uploadCover(this)"/>
      </div>`;
  } else {
    coverArea.innerHTML = `<div class="modal-cover-ph"><i class="ti ti-building" aria-hidden="true"></i></div>
      <button class="modal-close-btn" onclick="closeCardModal()"><i class="ti ti-x" aria-hidden="true"></i></button>
      <div class="modal-cover-actions">
        <label class="modal-cover-btn" for="coverInput"><i class="ti ti-camera" aria-hidden="true"></i> Adicionar capa</label>
        <input type="file" id="coverInput" accept="image/*" style="display:none" onchange="uploadCover(this)"/>
      </div>`;
  }

  // Labels
  document.getElementById('modalLabelsRow').innerHTML = labels.map(l =>
    `<span class="modal-label" style="background:${l.cor}" title="${esc(l.nome)}"></span>`).join('');

  // Título
  const titleEl = document.getElementById('modalTitle');
  titleEl.value = c.titulo;
  autoResize(titleEl);

  // Lista tag
  const sub = allSublistas.find(s => s.id === c.sublista_id);
  const grp = sub ? allGrupos.find(g => g.id === sub.grupo_id) : null;
  document.getElementById('modalListTag').textContent = sub ? `${grp?.nome || ''} › ${sub.nome}` : '—';

  // Meta grid
  let dueClass = '', dueTxt = '';
  if (due) {
    const diff = (due - today) / 86400000;
    dueTxt = due.toLocaleDateString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric'});
    if (diff < 0)  dueClass = 'overdue';
    else if (diff <= 3) dueClass = 'soon';
  }
  document.getElementById('modalMetaGrid').innerHTML = due ? `
    <div class="modal-meta-item">
      <div class="modal-meta-label">Data do leilão</div>
      <div class="modal-meta-val ${dueClass}">${dueTxt}</div>
    </div>
    ${labels.length ? `<div class="modal-meta-item">
      <div class="modal-meta-label">Etiquetas</div>
      <div class="modal-meta-val" style="display:flex;gap:4px;flex-wrap:wrap">${labels.map(l=>`<span style="background:${l.cor};color:#fff;font-size:10px;padding:2px 8px;border-radius:4px">${esc(l.nome)}</span>`).join('')}</div>
    </div>` : ''}` : '';

  // Descrição
  const descEl = document.getElementById('modalDesc');
  descEl.textContent = c.descricao || 'Clique para adicionar uma descrição...';
  document.getElementById('modalDescEdit').value = c.descricao || '';

  // Link
  const linkSection = document.getElementById('modalLinkSection');
  if (c.link_leilao) {
    linkSection.style.display = 'block';
    document.getElementById('modalLinkEl').href = c.link_leilao;
    document.getElementById('modalLinkText').textContent = c.link_leilao.length > 60 ? c.link_leilao.slice(0,60)+'…' : c.link_leilao;
  } else {
    linkSection.style.display = 'none';
  }

  // Fotos (sem a capa)
  const extraImgs = images.slice(1);
  document.getElementById('photoCount').textContent = images.length ? `(${images.length})` : '';
  document.getElementById('imgGrid').innerHTML = extraImgs.map((url,i) => `
    <div class="img-thumb">
      <img src="${esc(url)}" alt="foto ${i+2}" loading="lazy"/>
      <button class="img-thumb-del" onclick="removeImg(${i+1})" title="Remover"><i class="ti ti-x" style="font-size:10px" aria-hidden="true"></i></button>
    </div>`).join('');

  // Comentários
  loadComments(c.id);

  document.getElementById('cardModal').classList.add('open');
};

window.closeCardModal = function() {
  document.getElementById('cardModal').classList.remove('open');
  currentCard = null;
};

// ── COMENTÁRIOS ───────────────────────────────────────────────────────────────
async function loadComments(cardId) {
  const { data } = await supabase.from('leilao_comments').select('*').eq('card_id', cardId).order('created_at');
  const list = document.getElementById('commentsList');
  if (!data?.length) { list.innerHTML = ''; return; }
  list.innerHTML = data.map(cm => `
    <div class="comment-item">
      <div class="comment-av">${(cm.author_name||'?')[0].toUpperCase()}</div>
      <div class="comment-body">
        <div class="comment-meta">
          <span class="comment-author">${esc(cm.author_name||'?')}</span>
          <span class="comment-date">${new Date(cm.created_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>
        </div>
        <div class="comment-text">${esc(cm.body)}</div>
      </div>
    </div>`).join('');
}

window.postComment = async function() {
  const body = document.getElementById('commentInput').value.trim();
  if (!body || !currentCard) return;
  await supabase.from('leilao_comments').insert({
    card_id: currentCard.id, body,
    author_id: currentUser.id,
    author_name: currentUser.full_name || currentUser.email,
  });
  document.getElementById('commentInput').value = '';
  await loadComments(currentCard.id);
};

// ── UPLOAD IMAGENS ────────────────────────────────────────────────────────────
window.uploadCover = async function(input) {
  const file = input.files[0]; if (!file || !currentCard) return;
  const path = `${currentUser.id}/${Date.now()}.${file.name.split('.').pop()}`;
  const { data, error } = await supabase.storage.from('card-images').upload(path, file, { upsert: false });
  if (error) { showToast('Erro no upload', 'error'); return; }
  const { data: urlData } = supabase.storage.from('card-images').getPublicUrl(path);
  const imgs = [urlData.publicUrl, ...(currentCard.images||[]).filter((_,i)=>i>0)];
  await saveCardField('images', imgs);
  currentCard.images = imgs;
  openCardModal(currentCard);
  showToast('Capa atualizada!');
};

window.uploadImages = async function(input) {
  const files = input.files; if (!files?.length || !currentCard) return;
  showToast('Enviando...');
  const imgs = [...(currentCard.images||[])];
  for (const file of files) {
    if (imgs.length >= 20) { showToast('Máximo 20 fotos', 'error'); break; }
    const path = `${currentUser.id}/${Date.now()}-${Math.random().toString(36).slice(2)}.${file.name.split('.').pop()}`;
    const { data, error } = await supabase.storage.from('card-images').upload(path, file, { upsert: false });
    if (!error) {
      const { data: urlData } = supabase.storage.from('card-images').getPublicUrl(path);
      imgs.push(urlData.publicUrl);
    }
  }
  await saveCardField('images', imgs);
  currentCard.images = imgs;
  openCardModal(currentCard);
  showToast('Fotos adicionadas!');
  input.value = '';
};

window.removeImg = async function(idx) {
  if (!currentCard) return;
  const imgs = [...(currentCard.images||[])];
  imgs.splice(idx, 1);
  await saveCardField('images', imgs);
  currentCard.images = imgs;
  openCardModal(currentCard);
};

// ── EDITAR DESCRIÇÃO ──────────────────────────────────────────────────────────
window.editDesc = function() {
  document.getElementById('modalDesc').style.display = 'none';
  const editEl = document.getElementById('modalDescEdit');
  editEl.style.display = 'block';
  document.getElementById('descActions').style.display = 'flex';
  editEl.focus();
};
window.saveDesc = async function() {
  const val = document.getElementById('modalDescEdit').value.trim();
  await saveCardField('descricao', val);
  currentCard.descricao = val;
  document.getElementById('modalDesc').textContent = val || 'Clique para adicionar...';
  document.getElementById('modalDesc').style.display = 'block';
  document.getElementById('modalDescEdit').style.display = 'none';
  document.getElementById('descActions').style.display = 'none';
  showToast('Salvo!');
};
window.cancelDesc = function() {
  document.getElementById('modalDesc').style.display = 'block';
  document.getElementById('modalDescEdit').style.display = 'none';
  document.getElementById('descActions').style.display = 'none';
};

// ── NOVO CARD ─────────────────────────────────────────────────────────────────
window.openNewCardModal = function() {
  const titulo = prompt('Endereço / título do imóvel:');
  if (!titulo?.trim() || !currentSubId) return;
  createCard(titulo.trim());
};

async function createCard(titulo) {
  const { data, error } = await supabase.from('leilao_cards').insert({
    sublista_id: currentSubId, titulo, created_by: currentUser.id,
    posicao: 999,
  }).select().single();
  if (error) { showToast('Erro ao criar', 'error'); return; }
  showToast('Lote criado!');
  await selectSubRefresh();
  openCardModal(data);
}

async function selectSubRefresh() {
  const sub = allSublistas.find(s => s.id === currentSubId);
  const grp = sub ? allGrupos.find(g => g.id === sub.grupo_id) : null;
  if (sub) await selectSub(sub.id, grp?.nome||'', sub.nome);
}

// ── EDITAR / EXCLUIR SUBLISTA ─────────────────────────────────────────────────
window.editCurrentSub = function() {
  const sub = allSublistas.find(s => s.id === currentSubId); if (!sub) return;
  const nome = prompt('Novo nome:', sub.nome); if (!nome?.trim()) return;
  supabase.from('leilao_sublistas').update({ nome: nome.trim() }).eq('id', sub.id).then(async () => {
    showToast('Renomeado!');
    await loadSidebar();
    const grp = allGrupos.find(g => g.id === sub.grupo_id);
    await selectSub(sub.id, grp?.nome||'', nome.trim());
  });
};

window.deleteCurrentSub = function() {
  if (!confirm('Excluir esta lista e todos os seus cards?')) return;
  supabase.from('leilao_sublistas').delete().eq('id', currentSubId).then(async () => {
    showToast('Lista excluída');
    currentSubId = null;
    document.getElementById('kanbanArea').innerHTML = '<div class="loading"><i class="ti ti-layout-kanban" aria-hidden="true"></i> Selecione uma sublista</div>';
    document.getElementById('btnNewCard').style.display = 'none';
    document.getElementById('btnEditSub').style.display = 'none';
    document.getElementById('btnDelSub').style.display  = 'none';
    await loadSidebar();
  });
};

window.deleteCurrentCard = async function() {
  if (!currentCard || !confirm('Excluir este lote?')) return;
  await supabase.from('leilao_cards').delete().eq('id', currentCard.id);
  closeCardModal();
  showToast('Lote excluído');
  await selectSubRefresh();
};

// ── NOVO GRUPO / SUBLISTA ─────────────────────────────────────────────────────
window.openNewGroupForm = async function() {
  const nome = prompt('Nome do novo grupo:'); if (!nome?.trim()) return;
  const cor  = '#' + Math.floor(Math.random()*0xFFFFFF).toString(16).padStart(6,'0');
  await supabase.from('leilao_grupos').insert({ nome: nome.trim(), cor, posicao: allGrupos.length+1 });
  await loadSidebar();
  showToast('Grupo criado!');
};

window.openNewSubForm = async function(grupoId) {
  const nome = prompt('Nome da nova lista:'); if (!nome?.trim()) return;
  const { data } = await supabase.from('leilao_sublistas').insert({
    grupo_id: grupoId, nome: nome.trim(),
    posicao: allSublistas.filter(s=>s.grupo_id===grupoId).length + 1,
  }).select().single();
  await loadSidebar();
  const grp = allGrupos.find(g => g.id === grupoId);
  if (data) await selectSub(data.id, grp?.nome||'', data.nome);
  showToast('Lista criada!');
};

// ── SIDEBAR STUB BUTTONS ──────────────────────────────────────────────────────
window.openLabelEditor  = function() { showToast('Em breve: editor de etiquetas'); };
window.openMemberPicker = function() { showToast('Em breve: adicionar membros'); };
window.openDuePicker    = function() { showToast('Em breve: seletor de data'); };
window.openMoveCard     = function() { showToast('Em breve: mover card'); };

// ── SAVE FIELD ────────────────────────────────────────────────────────────────
async function saveCardField(field, value) {
  if (!currentCard) return;
  const { error } = await supabase.from('leilao_cards').update({ [field]: value }).eq('id', currentCard.id);
  if (error) showToast('Erro ao salvar', 'error');
  else await selectSubRefresh();
}

// ── FILTRO SIDEBAR ────────────────────────────────────────────────────────────
window.filterSidebar = function(q) {
  document.querySelectorAll('.sub-btn').forEach(btn => {
    const txt = btn.querySelector('.sl')?.textContent?.toLowerCase() || '';
    btn.style.display = txt.includes(q.toLowerCase()) ? '' : 'none';
  });
};

// ── UTILS ─────────────────────────────────────────────────────────────────────
window.handleSignOut = async function() { await supabase.auth.signOut(); location.href = './index.html'; };
window.autoResize    = function(el) { el.style.height='auto'; el.style.height=el.scrollHeight+'px'; };
function esc(s) { if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = type==='error' ? 'show error' : 'show';
  setTimeout(() => { el.className=''; }, 3000);
}
document.addEventListener('keydown', e => { if (e.key==='Escape') closeCardModal(); });
document.getElementById('commentInput').addEventListener('focus', () => {
  document.getElementById('commentActions').style.display = 'flex';
});

init();
</script>
</body>
</html>

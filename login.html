<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KanbanPro — Entrar</title>
  <link rel="stylesheet" href="./assets/css/global.css"/>
  <style>
    .input-group { position: relative; }
    .input-toggle-pass {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 16px; padding: 4px;
      transition: color var(--transition);
    }
    .input-toggle-pass:hover { color: var(--text-primary); }
    .alert-msg {
      background: var(--danger-bg); color: var(--danger);
      border: 1px solid var(--danger); border-radius: var(--radius-md);
      padding: 10px 14px; font-size: 13px; font-weight: 600;
      margin-bottom: 16px; display: none;
    }
    .alert-msg.show { display: block; }
    .alert-msg.success-msg { background: var(--success-bg); color: var(--success); border-color: var(--success); }
    .btn-login { width: 100%; justify-content: center; padding: 11px; font-size: 14px; position: relative; }
    #recovery-panel { display: none; }
    #recovery-panel.show { display: block; }
    #login-panel.hidden-panel { display: none; }
    .sector-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .sector-chip {
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1.5px solid var(--border); color: var(--text-muted); cursor: default;
    }
    .sector-chip.dev  { border-color: #3b82f6; color: #3b82f6; background: rgba(59,130,246,.08); }
    .sector-chip.loc  { border-color: #16a34a; color: #16a34a; background: rgba(22,163,74,.08); }
    .sector-chip.lei  { border-color: #d97706; color: #d97706; background: rgba(217,119,6,.08); }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">📋</div>
      <div>
        <div class="login-logo-text">KanbanPro</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:1px">Gestão por Setores</div>
      </div>
    </div>

    <div class="sector-chips" style="margin-bottom:20px">
      <span class="sector-chip dev">Desenvolvimento</span>
      <span class="sector-chip loc">Locadora</span>
      <span class="sector-chip lei">Leilão</span>
    </div>

    <div class="alert-msg" id="global-msg"></div>

    <!-- Login -->
    <div id="login-panel">
      <div class="login-title">Bem-vindo de volta</div>
      <div class="login-sub">Entre com seu e-mail e senha para continuar.</div>
      <div class="alert-msg" id="login-error"></div>
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" id="email" class="form-input" placeholder="seu@email.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <div class="input-group">
          <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password"/>
          <button class="input-toggle-pass" id="toggle-pass" type="button">👁</button>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:20px">
        <button class="forgot-link" id="show-recovery" type="button" style="font-size:12px;color:var(--primary);cursor:pointer;background:none;border:none;font-weight:700">Esqueci a senha</button>
      </div>
      <button class="btn btn-primary btn-login" id="btn-login" type="button">Entrar</button>
    </div>

    <!-- Recuperação -->
    <div id="recovery-panel">
      <div class="login-title">Recuperar senha</div>
      <div class="login-sub">Enviaremos um link de redefinição para seu e-mail.</div>
      <div class="alert-msg" id="recovery-msg"></div>
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" id="recovery-email" class="form-input" placeholder="seu@email.com"/>
      </div>
      <button class="btn btn-primary btn-login" id="btn-recovery" type="button">Enviar link</button>
      <button class="btn btn-ghost" id="back-login" type="button" style="width:100%;justify-content:center;margin-top:10px">← Voltar ao login</button>
    </div>
  </div>
</div>

<script type="module">
import { signIn, requireGuest, resetPassword } from "./assets/js/auth.js";

await requireGuest();

// Mostrar mensagem de query string
const params = new URLSearchParams(location.search);
const msgEl = document.getElementById("global-msg");
const msgs = { conta_inativa: "Sua conta está inativa. Contate o administrador.", senha_redefinida: "Senha redefinida com sucesso! Faça login." };
if (params.get("msg") && msgs[params.get("msg")]) {
  msgEl.textContent = msgs[params.get("msg")];
  msgEl.classList.add("show");
}

// Toggle senha
document.getElementById("toggle-pass").addEventListener("click", () => {
  const i = document.getElementById("password");
  i.type = i.type === "password" ? "text" : "password";
});

// Login
document.getElementById("btn-login").addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  const pass  = document.getElementById("password").value;
  const errEl = document.getElementById("login-error");
  errEl.classList.remove("show");
  if (!email || !pass) { errEl.textContent = "Preencha e-mail e senha."; errEl.classList.add("show"); return; }
  const btn = document.getElementById("btn-login");
  btn.disabled = true; btn.textContent = "Entrando...";
  try {
    await signIn(email, pass);
    window.location.href = "./kanban.html";
  } catch (e) {
    errEl.textContent = e.message?.includes("Invalid login") ? "E-mail ou senha incorretos." : (e.message || "Erro ao entrar.");
    errEl.classList.add("show");
    btn.disabled = false; btn.textContent = "Entrar";
  }
});

// Enter no password
document.getElementById("password").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("btn-login").click();
});

// Recuperação
document.getElementById("show-recovery").addEventListener("click", () => {
  document.getElementById("login-panel").classList.add("hidden-panel");
  document.getElementById("recovery-panel").classList.add("show");
});
document.getElementById("back-login").addEventListener("click", () => {
  document.getElementById("login-panel").classList.remove("hidden-panel");
  document.getElementById("recovery-panel").classList.remove("show");
});
document.getElementById("btn-recovery").addEventListener("click", async () => {
  const email = document.getElementById("recovery-email").value.trim();
  const msgEl = document.getElementById("recovery-msg");
  msgEl.classList.remove("show");
  if (!email) { msgEl.textContent = "Digite o e-mail."; msgEl.classList.add("show"); return; }
  try {
    await resetPassword(email);
    msgEl.textContent = "Link enviado! Verifique sua caixa de entrada.";
    msgEl.classList.add("show", "success-msg");
  } catch (e) {
    msgEl.textContent = e.message || "Erro ao enviar.";
    msgEl.classList.add("show");
  }
});
</script>
</body>
</html>

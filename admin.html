<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlowDesck — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #09090B;
      --surface:  #0C0C0E;
      --surface2: #111113;
      --border:   #18181B;
      --border2:  #27272A;
      --text:     #FAFAFA;
      --text2:    #A1A1AA;
      --text3:    #52525B;
      --text4:    #3F3F46;
      --accent:   #3B82F6;
      --green:    #22C55E;
      --amber:    #F59E0B;
      --red:      #EF4444;
      --purple:   #8B5CF6;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
      font-size: 13px;
    }

    /* ── RAIL ── */
    .rail {
      width: 44px; background: var(--bg);
      border-right: 0.5px solid var(--border);
      display: flex; flex-direction: column;
      align-items: center; padding: 12px 0; gap: 2px;
      flex-shrink: 0;
    }
    .rail-logo {
      width: 26px; height: 26px; background: var(--accent);
      border-radius: 6px; display: flex; align-items: center;
      justify-content: center; margin-bottom: 14px; cursor: pointer;
    }
    .rail-logo i { font-size: 14px; color: #fff; }
    .rail-btn {
      width: 32px; height: 32px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text3); transition: all .15s;
      border: none; background: transparent;
    }
    .rail-btn:hover { background: var(--border); color: var(--text2); }
    .rail-btn.active { background: var(--border); color: var(--text); }
    .rail-btn i { font-size: 17px; }
    .rail-sep { width: 20px; height: 0.5px; background: var(--border); margin: 6px 0; }

    /* ── SIDENAV ── */
    .sidenav {
      width: 200px; background: var(--surface);
      border-right: 0.5px solid var(--border);
      display: flex; flex-direction: column;
      flex-shrink: 0; overflow: hidden;
    }
    .sn-top {
      padding: 14px 14px 12px;
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
    }
    .sn-workspace {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 500; color: var(--text);
    }
    .sn-ws-dot {
      width: 20px; height: 20px; background: var(--accent);
      border-radius: 5px; display: flex; align-items: center;
      justify-content: center; font-size: 10px; font-weight: 600;
      color: #fff; flex-shrink: 0;
    }
    .sn-body { flex: 1; overflow-y: auto; padding: 6px 0; }
    .sn-body::-webkit-scrollbar { width: 0; }
    .sn-section {
      font-size: 10px; color: var(--text4);
      padding: 12px 14px 4px;
      letter-spacing: .8px; text-transform: uppercase;
    }
    .sn-item {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 14px; color: var(--text3); cursor: pointer;
      transition: all .1s; border-left: 2px solid transparent;
    }
    .sn-item:hover { color: var(--text2); background: var(--border); }
    .sn-item.active { color: var(--text); background: var(--border); border-left-color: var(--accent); }
    .sn-item i { font-size: 14px; flex-shrink: 0; }
    .sn-count {
      margin-left: auto; font-size: 10px;
      background: var(--border2); color: var(--text3);
      padding: 1px 6px; border-radius: 10px;
    }
    .sn-footer {
      padding: 12px 14px; border-top: 0.5px solid var(--border);
      flex-shrink: 0;
    }
    .sn-user {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
    }
    .sn-user-av {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center;
      justify-content: center; font-size: 10px; font-weight: 600; color: #fff;
      flex-shrink: 0;
    }
    .sn-user-name { font-size: 12px; color: var(--text2); }
    .sn-user-role { font-size: 10px; color: var(--text4); }

    /* ── MAIN ── */
    .main {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      background: var(--bg);
    }
    .main-header {
      padding: 16px 20px 14px;
      border-bottom: 0.5px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .main-title { font-size: 14px; font-weight: 500; letter-spacing: -.01em; }
    .main-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .header-actions { display: flex; gap: 6px; }
    .btn-sm {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px; font-size: 12px; font-family: 'Inter', sans-serif;
      border-radius: 6px; border: 0.5px solid var(--border2);
      background: transparent; color: var(--text2); cursor: pointer;
      transition: all .15s;
    }
    .btn-sm:hover { background: var(--border); color: var(--text); }
    .btn-sm.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-sm.primary:hover { background: #2563EB; }
    .btn-sm i { font-size: 14px; }
    .main-body {
      flex: 1; overflow-y: auto; padding: 18px 20px;
      display: flex; flex-direction: column; gap: 18px;
    }
    .main-body::-webkit-scrollbar { width: 4px; }
    .main-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    /* ── STATS ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    }
    .stat-card {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 8px; padding: 14px; position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    }
    .stat-card.blue::before  { background: linear-gradient(90deg, transparent, #3B82F6, transparent); }
    .stat-card.red::before   { background: linear-gradient(90deg, transparent, #EF4444, transparent); }
    .stat-card.amber::before { background: linear-gradient(90deg, transparent, #F59E0B, transparent); }
    .stat-card.green::before { background: linear-gradient(90deg, transparent, #22C55E, transparent); }
    .stat-val { font-size: 26px; font-weight: 500; letter-spacing: -.03em; line-height: 1; }
    .stat-lbl { font-size: 11px; color: var(--text3); margin-top: 5px; }
    .stat-sub { font-size: 10px; color: var(--text4); margin-top: 2px; }

    /* ── SETORES ── */
    .section-label {
      font-size: 10px; color: var(--text4);
      text-transform: uppercase; letter-spacing: .8px;
      margin-bottom: 8px;
    }
    .sectors-table {
      border: 0.5px solid var(--border); border-radius: 8px;
      overflow: hidden; background: var(--bg);
    }
    .sector-row {
      display: flex; align-items: center; gap: 0;
      padding: 13px 16px; border-bottom: 0.5px solid var(--border);
      cursor: pointer; transition: background .1s;
    }
    .sector-row:last-child { border-bottom: none; }
    .sector-row:hover { background: var(--surface); }
    .sector-ind { width: 3px; height: 34px; border-radius: 2px; flex-shrink: 0; margin-right: 14px; }
    .sector-info { flex: 1; min-width: 0; }
    .sector-name {
      font-size: 13px; font-weight: 500; color: var(--text);
      display: flex; align-items: center; gap: 6px;
    }
    .sector-detail { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .sector-metrics { display: flex; align-items: center; gap: 20px; flex-shrink: 0; }
    .sector-metric { text-align: right; min-width: 48px; }
    .sector-metric-val { font-size: 13px; font-weight: 500; color: var(--text2); }
    .sector-metric-val.red   { color: var(--red); }
    .sector-metric-val.green { color: var(--green); }
    .sector-metric-val.amber { color: var(--amber); }
    .sector-metric-lbl { font-size: 10px; color: var(--text4); margin-top: 1px; }
    .pill {
      font-size: 10px; padding: 1px 6px; border-radius: 4px;
      font-weight: 500; flex-shrink: 0;
    }
    .pill-blue  { background: rgba(59,130,246,.12); color: #60A5FA; border: 0.5px solid rgba(59,130,246,.2); }
    .pill-green { background: rgba(34,197,94,.1);  color: #4ADE80; border: 0.5px solid rgba(34,197,94,.15); }
    .pill-amber { background: rgba(245,158,11,.1); color: #FCD34D; border: 0.5px solid rgba(245,158,11,.15); }
    .pill-red   { background: rgba(239,68,68,.1);  color: #F87171; border: 0.5px solid rgba(239,68,68,.15); }
    .go-btn {
      width: 26px; height: 26px; border-radius: 5px;
      background: transparent; border: 0.5px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      color: var(--text3); margin-left: 16px; flex-shrink: 0;
      transition: all .15s;
    }
    .sector-row:hover .go-btn { border-color: var(--text3); color: var(--text2); }
    .go-btn i { font-size: 13px; }

    /* ── FEED ── */
    .feed-row {
      display: flex; align-items: baseline; gap: 8px;
      padding: 6px 0; border-bottom: 0.5px solid var(--border);
    }
    .feed-row:last-child { border-bottom: none; }
    .feed-time { font-size: 10px; color: var(--text4); width: 28px; flex-shrink: 0; text-align: right; }
    .feed-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .feed-txt { font-size: 12px; color: var(--text3); line-height: 1.4; flex: 1; }
    .feed-txt b { color: var(--text2); font-weight: 500; }
    .feed-sector { font-size: 10px; color: var(--text4); }

    /* ── SEÇÕES (tabs) ── */
    .section-body { display: none; flex-direction: column; gap: 18px; }
    .section-body.active { display: flex; }

    /* ── USUÁRIOS ── */
    .users-table { border: 0.5px solid var(--border); border-radius: 8px; overflow: hidden; }
    .users-head {
      display: grid; grid-template-columns: 1fr 80px 120px 80px 80px;
      padding: 8px 16px; border-bottom: 0.5px solid var(--border);
      background: var(--surface);
    }
    .users-head span { font-size: 10px; color: var(--text4); text-transform: uppercase; letter-spacing: .6px; }
    .user-row {
      display: grid; grid-template-columns: 1fr 80px 120px 80px 80px;
      padding: 10px 16px; border-bottom: 0.5px solid var(--border);
      align-items: center; transition: background .1s; cursor: pointer;
    }
    .user-row:last-child { border-bottom: none; }
    .user-row:hover { background: var(--surface); }
    .user-info { display: flex; align-items: center; gap: 8px; }
    .user-av {
      width: 26px; height: 26px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600; color: #fff; flex-shrink: 0;
    }
    .user-name { font-size: 13px; font-weight: 500; }
    .user-email { font-size: 11px; color: var(--text3); }
    .badge {
      font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 500;
      display: inline-block;
    }
    .badge-admin  { background: rgba(139,92,246,.15); color: #A78BFA; }
    .badge-gerente { background: rgba(59,130,246,.15); color: #60A5FA; }
    .badge-colab  { background: var(--border2); color: var(--text3); }
    .badge-active { background: rgba(34,197,94,.1); color: #4ADE80; }
    .badge-inactive { background: rgba(239,68,68,.1); color: #F87171; }
    .sector-chips { display: flex; flex-wrap: wrap; gap: 3px; }
    .chip {
      font-size: 9px; padding: 1px 5px; border-radius: 3px;
      background: var(--border2); color: var(--text3);
    }

    /* ── COMUNICADOS ── */
    .ann-list { display: flex; flex-direction: column; gap: 8px; }
    .ann-card {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 8px; padding: 14px 16px;
      border-left: 2px solid var(--amber);
    }
    .ann-card.important { border-left-color: var(--accent); }
    .ann-card.urgent    { border-left-color: var(--red); }
    .ann-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
    .ann-title { font-size: 13px; font-weight: 500; }
    .ann-body  { font-size: 12px; color: var(--text3); line-height: 1.6; margin-bottom: 6px; }
    .ann-meta  { font-size: 10px; color: var(--text4); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      padding: 20px; opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal {
      background: var(--surface); border: 0.5px solid var(--border2);
      border-radius: 12px; width: 100%; max-width: 480px; max-height: 88vh;
      display: flex; flex-direction: column; overflow: hidden;
      transform: scale(.97) translateY(4px); transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }
    .modal-header {
      padding: 16px 18px; border-bottom: 0.5px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 14px; font-weight: 500; }
    .modal-close {
      background: transparent; border: none; cursor: pointer;
      color: var(--text3); padding: 4px; border-radius: 5px;
    }
    .modal-close:hover { color: var(--text); background: var(--border); }
    .modal-close i { font-size: 16px; }
    .modal-body {
      padding: 18px; overflow-y: auto; display: flex; flex-direction: column; gap: 13px;
    }
    .modal-footer {
      padding: 12px 18px; border-top: 0.5px solid var(--border);
      display: flex; justify-content: flex-end; gap: 6px;
    }
    .field-group { display: flex; flex-direction: column; gap: 5px; }
    .field-row { display: flex; gap: 10px; }
    .field-row .field-group { flex: 1; }
    .field-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .7px; }
    .field-input, .field-select, .field-textarea {
      background: var(--bg); border: 0.5px solid var(--border2);
      border-radius: 6px; padding: 8px 10px; font-size: 12px;
      color: var(--text); font-family: 'Inter', sans-serif;
      outline: none; width: 100%; transition: border-color .15s; appearance: none;
    }
    .field-input:focus, .field-select:focus, .field-textarea:focus { border-color: var(--accent); }
    .field-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    .field-input::placeholder, .field-textarea::placeholder { color: var(--text4); }
    .sectors-check { display: flex; flex-wrap: wrap; gap: 6px; }
    .sector-check-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; cursor: pointer;
      background: var(--bg); border: 0.5px solid var(--border2);
      border-radius: 5px; padding: 5px 9px; transition: all .15s;
    }
    .sector-check-item:has(input:checked) { border-color: var(--accent); background: rgba(59,130,246,.08); color: #60A5FA; }
    .sector-check-item input { accent-color: var(--accent); width: 12px; height: 12px; cursor: pointer; }
    .btn-ghost {
      background: transparent; border: 0.5px solid var(--border2);
      border-radius: 6px; padding: 7px 14px; font-size: 12px; color: var(--text3);
      font-family: 'Inter', sans-serif; cursor: pointer; transition: all .15s;
    }
    .btn-ghost:hover { border-color: var(--text3); color: var(--text); }
    .btn-save {
      background: var(--accent); border: none; border-radius: 6px;
      padding: 7px 18px; font-size: 12px; font-weight: 500; color: #fff;
      font-family: 'Inter', sans-serif; cursor: pointer; transition: background .15s;
    }
    .btn-save:hover { background: #2563EB; }
    .btn-danger {
      background: rgba(239,68,68,.1); border: 0.5px solid rgba(239,68,68,.3);
      border-radius: 6px; padding: 7px 12px; font-size: 12px; color: var(--red);
      font-family: 'Inter', sans-serif; cursor: pointer; margin-right: auto;
    }

    .spinner {
      width: 28px; height: 28px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .7s linear infinite; margin: 30px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #toast {
      position: fixed; bottom: 20px; right: 20px; z-index: 999;
      background: #16a34a; color: #fff; padding: 9px 16px;
      border-radius: 7px; font-size: 12px; font-weight: 500;
      opacity: 0; transform: translateY(6px); transition: all .2s; pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error { background: #dc2626; }

    /* MOBILE */
    @media (max-width: 768px) {
      .rail, .admin-rail { position:fixed; bottom:0; left:0; right:0; width:100%; height:56px; flex-direction:row; justify-content:space-around; border-right:none; border-top:0.5px solid var(--border); z-index:90; padding:0; }
      .sidenav, .admin-sidenav { display:none !important; }
      .main-content, .admin-content, .content { padding-bottom:56px !important; }
      .rail { display: none; }
      .sidenav { width: 100%; height: 48px; flex-direction: row; border-right: none; border-bottom: 0.5px solid var(--border); }
      body { flex-direction: column; }
      .sidenav .sn-top, .sidenav .sn-body, .sidenav .sn-footer { display: none; }
      .stats-grid { grid-template-columns: repeat(2,1fr); }
      .users-head, .user-row { grid-template-columns: 1fr 70px 60px; }
      .users-head span:nth-child(4), .users-head span:nth-child(5),
      .user-row > *:nth-child(4), .user-row > *:nth-child(5) { display: none; }
      .modal { max-width: 100%; border-radius: 12px 12px 0 0; position: fixed; bottom: 0; left: 0; right: 0; max-height: 90vh; }
      .modal-overlay { align-items: flex-end; padding: 0; }
      .field-row { flex-direction: column; }
    }
  </style>
  <link rel="stylesheet" href="./mobile.css"/>
</head>
<body>

<!-- RAIL -->
<div class="rail">
  <div class="rail-logo" onclick="window.location.href='./index.html'">
    <i class="ti ti-layout-grid" aria-hidden="true"></i>
  </div>
  <button class="rail-btn active" id="rail-dash" title="Dashboard" onclick="setSection('dash', this)">
    <i class="ti ti-layout-dashboard" aria-hidden="true"></i>
  </button>
  <button class="rail-btn" id="rail-users" title="Usuários" onclick="setSection('users', this)">
    <i class="ti ti-users" aria-hidden="true"></i>
  </button>
  <button class="rail-btn" id="rail-ann" title="Comunicados" onclick="setSection('ann', this)">
    <i class="ti ti-bell" aria-hidden="true"></i>
  </button>
  <div class="rail-sep"></div>
  <button class="rail-btn" title="Sair" onclick="handleSignOut()">
    <i class="ti ti-logout" aria-hidden="true"></i>
  </button>
</div>

<!-- SIDENAV -->
<div class="sidenav">
  <div class="sn-top">
    <div class="sn-workspace">
      <div class="sn-ws-dot">F</div>
      FlowDesck
    </div>
  </div>
  <div class="sn-body">
    <div class="sn-section">Sistema</div>
    <div class="sn-item active" onclick="setSection('dash', this)" data-sec="dash">
      <i class="ti ti-layout-dashboard" aria-hidden="true"></i>Dashboard
    </div>
    <div class="sn-item" onclick="setSection('users', this)" data-sec="users">
      <i class="ti ti-users" aria-hidden="true"></i>Usuários
      <span class="sn-count" id="snCountUsers">—</span>
    </div>
    <div class="sn-item" onclick="setSection('ann', this)" data-sec="ann">
      <i class="ti ti-bell" aria-hidden="true"></i>Comunicados
      <span class="sn-count" id="snCountAnn">—</span>
    </div>
    <div class="sn-section">Setores</div>
    <div class="sn-item" onclick="window.location.href='./dashboard-desenvolvimento.html'">
      <i class="ti ti-code" aria-hidden="true"></i>Desenvolvimento
    </div>
    <div class="sn-item" onclick="window.location.href='./dashboard-locadora.html'">
      <i class="ti ti-car" aria-hidden="true"></i>Locadora
    </div>
    <div class="sn-item" onclick="window.location.href='./dashboard-leilao.html'">
      <i class="ti ti-gavel" aria-hidden="true"></i>Leilão
    </div>
  </div>
  <div class="sn-footer">
    <div class="sn-user">
      <div class="sn-user-av" id="snAvatar">?</div>
      <div>
        <div class="sn-user-name" id="snName">—</div>
        <div class="sn-user-role">Admin</div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="main-header">
    <div>
      <div class="main-title" id="mainTitle">Dashboard</div>
      <div class="main-sub" id="mainSub">Visão consolidada de todos os setores</div>
    </div>
    <div class="header-actions" id="headerActions">
      <button class="btn-sm" onclick="setSection('users', null); openUserModal(null)">
        <i class="ti ti-user-plus" aria-hidden="true"></i>Novo usuário
      </button>
      <button class="btn-sm" onclick="setSection('ann', null); openAnnModal(null)">
        <i class="ti ti-bell-plus" aria-hidden="true"></i>Novo aviso
      </button>
    </div>
  </div>

  <div class="main-body">

    <!-- DASHBOARD -->
    <div class="section-body active" id="sec-dash">
      <div class="stats-grid" id="statsGrid">
        <div class="spinner" style="grid-column:span 4"></div>
      </div>
      <div>
        <div class="section-label">Setores</div>
        <div class="sectors-table" id="sectorsTable">
          <div class="spinner"></div>
        </div>
      </div>
      <div>
        <div class="section-label">Atividade recente</div>
        <div id="feedList"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- USUÁRIOS -->
    <div class="section-body" id="sec-users">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="section-label" style="margin:0" id="usersLabel">Usuários</div>
        <button class="btn-sm primary" onclick="openUserModal(null)">
          <i class="ti ti-user-plus" aria-hidden="true"></i>Novo usuário
        </button>
      </div>
      <div class="users-table">
        <div class="users-head">
          <span>Usuário</span><span>Role</span><span>Setores</span><span>Status</span><span></span>
        </div>
        <div id="usersBody"><div class="spinner"></div></div>

<!-- MODAL USUÁRIO -->
<div class="modal-overlay" id="userModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="userModalTitle">Novo Usuário</div>
      <button class="modal-close" onclick="closeUserModal()"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <div class="modal-body">
      <div class="field-group"><label class="field-label">Nome completo</label>
        <input class="field-input" id="uName" placeholder="Nome do usuário"/></div>
      <div class="field-group"><label class="field-label">E-mail</label>
        <input class="field-input" id="uEmail" type="email" placeholder="email@empresa.com"/></div>
      <div class="field-group" id="uPassGroup"><label class="field-label">Senha inicial</label>
        <input class="field-input" id="uPass" type="password" placeholder="Mínimo 6 caracteres"/></div>
      <div class="field-row">
        <div class="field-group"><label class="field-label">Função</label>
          <select class="field-select" id="uRole">
            <option value="colaborador">Colaborador</option>

        <div class="sectors-check">
          <label class="sector-check-item"><input type="checkbox" id="sec-dev" value="desenvolvimento"/>Desenvolvimento</label>
          <label class="sector-check-item"><input type="checkbox" id="sec-loc" value="locadora"/>Locadora</label>
          <label class="sector-check-item"><input type="checkbox" id="sec-lei" value="leilao"/>Leilão</label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeUserModal()">Cancelar</button>
      <button class="btn-save" onclick="saveUser()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL COMUNICADO -->
<div class="modal-overlay" id="annModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="annModalTitle">Novo Aviso</div>
      <button class="modal-close" onclick="closeAnnModal()"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <div class="modal-body">
      <div class="field-group"><label class="field-label">Título</label>
        <input class="field-input" id="aTitle" placeholder="Título do aviso"/></div>
      <div class="field-group"><label class="field-label">Mensagem</label>
        <textarea class="field-textarea" id="aBody" placeholder="Escreva o aviso..."></textarea></div>
      <div class="field-row">
        <div class="field-group"><label class="field-label">Prioridade</label>
          <select class="field-select" id="aPrio">
            <option value="normal">Normal</option>
            <option value="important">Importante</option>
            <option value="urgent">Urgente</option>
          </select></div>
        <div class="field-group"><label class="field-label">Fixar no topo</label>
          <select class="field-select" id="aPinned">
            <option value="false">Não</option>
            <option value="true">Sim</option>
          </select></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="btnDeleteAnn" onclick="deleteAnn()" style="display:none">Excluir</button>
      <button class="btn-ghost" onclick="closeAnnModal()">Cancelar</button>
      <button class="btn-save" onclick="saveAnn()">Publicar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient(
  'https://ooejtjqxobfrletpssjm.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vZWp0anF4b2JmcmxldHBzc2ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTIzMzY4ODMsImV4cCI6MjA2NzkxMjg4M30.wTCrQfXVD6q47r-vN4iEsPkwaGV0qM-oTGnQpx525Mo'
);

let currentUser = null;
let allUsers = [], allAnns = [], allCards = [];
let editingUserId = null, editingAnnId = null;

// ── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { location.href = './index.html'; return; }
  const { data: profile } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
  if (!profile?.active || profile.role !== 'admin') { location.href = './index.html'; return; }
  currentUser = { ...session.user, ...profile };
  const name = profile.full_name || session.user.email.split('@')[0];
  document.getElementById('snAvatar').textContent = name[0].toUpperCase();
  document.getElementById('snName').textContent   = name;
  await Promise.all([loadUsers(), loadAnns(), loadCards(), loadActivity()]);
  renderDash();
}

// ── NAVEGAÇÃO ─────────────────────────────────────────────────────────────────
window.setSection = function(sec, triggerEl) {
  document.querySelectorAll('.section-body').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.sn-item[data-sec]').forEach(i => i.classList.remove('active'));
  document.querySelectorAll('.rail-btn[id^="rail-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + sec).classList.add('active');
  const snItem = document.querySelector(`.sn-item[data-sec="${sec}"]`);
  if (snItem) snItem.classList.add('active');
  const railBtn = document.getElementById('rail-' + sec);
  if (railBtn) railBtn.classList.add('active');
  const titles = { dash: 'Dashboard', users: 'Usuários', ann: 'Comunicados' };
  document.getElementById('mainTitle').textContent = titles[sec] || 'Admin';
  document.getElementById('mainSub').textContent = sec === 'dash' ? 'Visão consolidada de todos os setores' : '';
  document.getElementById('headerActions').style.display = sec === 'dash' ? 'flex' : 'none';
};

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadUsers() {
  const { data } = await supabase.from('profiles').select('*').order('created_at', { ascending: false });
  allUsers = data || [];
  document.getElementById('snCountUsers').textContent = allUsers.length;
  document.getElementById('usersLabel').textContent   = `${allUsers.length} usuários`;
  renderUsers();
}

async function loadAnns() {
  const { data } = await supabase.from('announcements').select('*, author:author_id(full_name)')
    .order('pinned', { ascending: false }).order('created_at', { ascending: false });
  allAnns = data || [];
  document.getElementById('snCountAnn').textContent = allAnns.length;
  document.getElementById('annLabel').textContent   = `${allAnns.length} comunicados`;
  renderAnns();
}

async function loadCards() {
  const { data } = await supabase.from('cards').select('sector, column_id, due_date, priority');
  allCards = data || [];
}

async function loadActivity() {
  const { data } = await supabase.from('activity_log').select('*')
    .order('created_at', { ascending: false }).limit(10);
  renderFeed(data || []);
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderDash() {
  const total    = allUsers.length;
  const active   = allUsers.filter(u => u.active).length;
  const cards    = allCards.length;
  const today    = new Date(); today.setHours(0,0,0,0);
  const overdue  = allCards.filter(c => c.due_date && new Date(c.due_date+'T12:00:00') < today && c.column_id !== 'done' && c.column_id !== 'resolvido' && c.column_id !== 'concluido' && c.column_id !== 'arrematado').length;
  const annCount = allAnns.length;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card blue">
      <div class="stat-val" style="color:#60A5FA">${active}</div>
      <div class="stat-lbl">Usuários ativos</div>
      <div class="stat-sub">${total} cadastrados</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${cards}</div>
      <div class="stat-lbl">Cards abertos</div>
      <div class="stat-sub">todos os setores</div>
    </div>
    <div class="stat-card red">
      <div class="stat-val" style="color:#F87171">${overdue}</div>
      <div class="stat-lbl">Atrasados</div>
      <div class="stat-sub">requerem atenção</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-val" style="color:#FCD34D">${annCount}</div>
      <div class="stat-lbl">Comunicados</div>
      <div class="stat-sub">publicados</div>
    </div>`;

  const sectorDef = [
    { id:'desenvolvimento', label:'Desenvolvimento', color:'#3B82F6', detail:'Projetos e sprints', pill:'blue', pillLabel: null, doneCol:['done'] },
    { id:'locadora', label:'Locadora', color:'#22C55E', detail:'Demandas administrativas', pill:'green', pillLabel:null, doneCol:['resolvido'] },
    { id:'leilao', label:'Leilão', color:'#F59E0B', detail:'Gestão de lotes', pill:'amber', pillLabel:null, doneCol:['arrematado','cancelado'] },
  ];

  document.getElementById('sectorsTable').innerHTML = sectorDef.map(s => {
    const sc      = allCards.filter(c => c.sector === s.id);
    const done    = sc.filter(c => s.doneCol.includes(c.column_id)).length;
    const late    = sc.filter(c => c.due_date && new Date(c.due_date+'T12:00:00') < today && !s.doneCol.includes(c.column_id)).length;
    const urgent  = sc.filter(c => c.priority === 'urgent').length;
    const members = allUsers.filter(u => u.sectors?.includes(s.id) && u.active).length;
    const lateHtml = late > 0 ? `<span class="pill pill-red">${late} atrasado${late>1?'s':''}</span>` : '';
    return `
    <div class="sector-row" onclick="window.location.href='./dashboard-${s.id}.html'">
      <div class="sector-ind" style="background:${s.color}"></div>
      <div class="sector-info">
        <div class="sector-name">${s.label} ${lateHtml}</div>
        <div class="sector-detail">${s.detail} · ${members} membro${members!==1?'s':''}</div>
      </div>
      <div class="sector-metrics">
        <div class="sector-metric">
          <div class="sector-metric-val">${sc.length}</div>
          <div class="sector-metric-lbl">cards</div>
        </div>
        <div class="sector-metric">
          <div class="sector-metric-val ${late>0?'red':''}">${late}</div>
          <div class="sector-metric-lbl">atrasados</div>
        </div>
        <div class="sector-metric">
          <div class="sector-metric-val green">${done}</div>
          <div class="sector-metric-lbl">concluídos</div>
        </div>
        <div class="sector-metric">
          <div class="sector-metric-val ${urgent>0?'amber':''}">${urgent}</div>
          <div class="sector-metric-lbl">urgentes</div>
        </div>
      </div>
      <div class="go-btn"><i class="ti ti-arrow-right" aria-hidden="true"></i></div>
    </div>`;
  }).join('');
}

function renderFeed(data) {
  const div = document.getElementById('feedList');
  if (!data.length) { div.innerHTML = '<div style="font-size:12px;color:var(--text4);padding:10px 0">Nenhuma atividade registrada ainda.</div>'; return; }
  const colors = { create:'#22C55E', update:'#3B82F6', move:'#F59E0B', delete:'#EF4444' };
  div.innerHTML = `<div>${data.map(a => {
    const type = a.action?.match(/cri|cre/) ? 'create' : a.action?.match(/mov/) ? 'move' : a.action?.match(/del|exc/) ? 'delete' : 'update';
    const mins = Math.round((Date.now() - new Date(a.created_at).getTime()) / 60000);
    const ago  = mins < 60 ? `${mins}m` : mins < 1440 ? `${Math.round(mins/60)}h` : `${Math.round(mins/1440)}d`;
    return `<div class="feed-row">
      <div class="feed-time">${ago}</div>
      <div class="feed-dot" style="background:${colors[type]}"></div>
      <div class="feed-txt"><b>${esc(a.user_name||'?')}</b> ${esc(a.action)} <span class="feed-sector">— ${a.sector||''}</span></div>
    </div>`;
  }).join('')}</div>`;
}

// ── USUÁRIOS ─────────────────────────────────────────────────────────────────
function renderUsers() {
  const SECTOR_LABELS = { desenvolvimento:'Dev', locadora:'Loc', leilao:'Lei' };
  const tbody = document.getElementById('usersBody');
  if (!allUsers.length) { tbody.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text4);font-size:12px">Nenhum usuário</div>'; return; }
  tbody.innerHTML = allUsers.map(u => {
    const chips = (u.sectors||[]).map(s=>`<span class="chip">${SECTOR_LABELS[s]||s}</span>`).join('');
    const dt    = new Date(u.created_at).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'});
    return `<div class="user-row" onclick="openUserModal('${u.id}')">
      <div class="user-info">
        <div class="user-av">${(u.full_name||'?')[0].toUpperCase()}</div>
        <div>
          <div class="user-name">${esc(u.full_name)}</div>
          <div class="user-email">${esc(u.email)}</div>
        </div>
      </div>
      <div><span class="badge badge-${u.role==='admin'?'admin':u.role==='gerente'?'gerente':'colab'}">${u.role}</span></div>
      <div><div class="sector-chips">${chips||'<span style="color:var(--text4);font-size:11px">—</span>'}</div></div>
      <div><span class="badge ${u.active?'badge-active':'badge-inactive'}">${u.active?'Ativo':'Inativo'}</span></div>
      <div style="font-size:11px;color:var(--text4)">${dt}</div>
    </div>`;
  }).join('');
}

window.openUserModal = function(uid) {
  editingUserId = uid;
  document.getElementById('userModalTitle').textContent = uid ? 'Editar Usuário' : 'Novo Usuário';
  document.getElementById('uPassGroup').style.display   = uid ? 'none' : 'flex';
  if (uid) {
    const u = allUsers.find(x => x.id === uid); if (!u) return;
    document.getElementById('uName').value    = u.full_name;
    document.getElementById('uEmail').value   = u.email;
    document.getElementById('uRole').value    = u.role;
    document.getElementById('uActive').value  = String(u.active);
    document.getElementById('sec-dev').checked = (u.sectors||[]).includes('desenvolvimento');
    document.getElementById('sec-loc').checked = (u.sectors||[]).includes('locadora');
    document.getElementById('sec-lei').checked = (u.sectors||[]).includes('leilao');
  } else {
    ['uName','uEmail','uPass'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('uRole').value   = 'colaborador';
    document.getElementById('uActive').value = 'true';
    ['sec-dev','sec-loc','sec-lei'].forEach(id => document.getElementById(id).checked = false);
  }
  document.getElementById('userModal').classList.add('open');
};
window.closeUserModal = function() { document.getElementById('userModal').classList.remove('open'); editingUserId = null; };

window.saveUser = async function() {
  const name    = document.getElementById('uName').value.trim();
  const email   = document.getElementById('uEmail').value.trim();
  const role    = document.getElementById('uRole').value;
  const active  = document.getElementById('uActive').value === 'true';
  const sectors = ['sec-dev','sec-loc','sec-lei'].filter(id => document.getElementById(id).checked).map(id => document.getElementById(id).value);
  if (!name || !email) { showToast('Preencha nome e e-mail', 'error'); return; }

  if (editingUserId) {
    const { error } = await supabase.from('profiles').update({ full_name:name, role, active, sectors }).eq('id', editingUserId);
    if (error) { showToast('Erro: '+error.message, 'error'); return; }
    showToast('Usuário atualizado!');
  } else {
    const pass = document.getElementById('uPass').value;
    if (!pass || pass.length < 6) { showToast('Senha mínima de 6 caracteres', 'error'); return; }
    const { error: sqlError } = await supabase.rpc('criar_usuario', { p_email: email, p_senha: pass, p_nome: name });
    if (sqlError) { showToast('Erro ao criar: ' + sqlError.message, 'error'); return; }
    await supabase.from('profiles').update({ full_name: name, role, active, sectors, first_access: true }).eq('email', email);
    // Disparar e-mail de boas-vindas
    try {
      const { data: { session } } = await supabase.auth.getSession();
      await fetch('https://ooejtjqxobfrletpssjm.supabase.co/functions/v1/send-welcome-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session?.access_token },
        body: JSON.stringify({ nome: name, email, senha: pass, setores: sectors.join(', ') || role, loginUrl: 'https://evbergbraga-sketch.github.io/FlowDesck/' }),
      });
    } catch(e) { console.warn('Email não enviado:', e); }
    showToast(`Usuário criado! E-mail enviado para ${email}`);
  }
  closeUserModal();
  await loadUsers();
};

// ── COMUNICADOS ───────────────────────────────────────────────────────────────
function renderAnns() {
  const div = document.getElementById('annList');
  if (!allAnns.length) { div.innerHTML = '<div style="font-size:12px;color:var(--text4);padding:10px 0">Nenhum comunicado publicado.</div>'; return; }
  const PRIO = { normal:'Aviso', important:'Importante', urgent:'Urgente' };
  div.innerHTML = allAnns.map(a => {
    const dt = new Date(a.created_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
    const prioPill = `<span class="pill ${a.priority==='urgent'?'pill-red':a.priority==='important'?'pill-blue':'pill-amber'}">${PRIO[a.priority]||'Aviso'}</span>`;
    return `<div class="ann-card ${a.priority}">
      <div class="ann-card-head">
        <div class="ann-title">${a.pinned?'📌 ':''}${esc(a.title)}</div>
        <div style="display:flex;align-items:center;gap:6px">
          ${prioPill}
          <button class="btn-sm" style="padding:4px 8px;font-size:11px" onclick="openAnnModal('${a.id}')">Editar</button>
        </div>
      </div>
      <div class="ann-body">${esc(a.body)}</div>
      <div class="ann-meta">${dt} · ${esc(a.author?.full_name||'Admin')}</div>
    </div>`;
  }).join('');
}

window.openAnnModal = function(annId) {
  editingAnnId = annId||null;
  document.getElementById('annModalTitle').textContent = annId ? 'Editar Aviso' : 'Novo Aviso';
  document.getElementById('btnDeleteAnn').style.display = annId ? 'block' : 'none';
  if (annId) {
    const a = allAnns.find(x => x.id === annId); if (!a) return;
    document.getElementById('aTitle').value  = a.title;
    document.getElementById('aBody').value   = a.body;
    document.getElementById('aPrio').value   = a.priority;
    document.getElementById('aPinned').value = String(a.pinned);
  } else {
    ['aTitle','aBody'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('aPrio').value = 'normal'; document.getElementById('aPinned').value = 'false';
  }
  document.getElementById('annModal').classList.add('open');
};
window.closeAnnModal = function() { document.getElementById('annModal').classList.remove('open'); editingAnnId = null; };

window.saveAnn = async function() {
  const title = document.getElementById('aTitle').value.trim();
  const body  = document.getElementById('aBody').value.trim();
  if (!title || !body) { showToast('Preencha título e mensagem', 'error'); return; }
  const payload = { title, body, priority: document.getElementById('aPrio').value, pinned: document.getElementById('aPinned').value === 'true', author_id: currentUser.id };
  const { error } = editingAnnId
    ? await supabase.from('announcements').update(payload).eq('id', editingAnnId)
    : await supabase.from('announcements').insert(payload);
  if (error) { showToast('Erro', 'error'); return; }
  showToast(editingAnnId ? 'Atualizado!' : 'Publicado!');
  closeAnnModal(); await loadAnns();
};

window.deleteAnn = async function() {
  if (!editingAnnId || !confirm('Excluir aviso?')) return;
  await supabase.from('announcements').delete().eq('id', editingAnnId);
  showToast('Excluído'); closeAnnModal(); await loadAnns();
};

window.handleSignOut = async function() { await supabase.auth.signOut(); location.href = './index.html'; };
function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = type === 'error' ? 'show error' : 'show';
  setTimeout(() => { el.className = ''; }, 3000);
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeUserModal(); closeAnnModal(); } });
init();
</script>

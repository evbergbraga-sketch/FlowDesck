<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlowDesck — Leilão</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#080A10; --surface:#0D0F14; --surface2:#111827;
      --border:#1E2535; --border2:#1A2030; --text:#F1F5F9;
      --muted:#64748B; --muted2:#475569;
      --accent:#D97706; --accent2:#B45309;
      --green:#22C55E; --amber:#F59E0B; --red:#EF4444;
      --purple:#8B5CF6; --cyan:#06B6D4; --blue:#3B82F6;
    }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

    .topbar { height:56px; background:var(--surface); border-bottom:0.5px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:12px; flex-shrink:0; position:sticky; top:0; z-index:100; }
    .logo { display:flex; align-items:center; gap:8px; font-family:'Syne',sans-serif; font-size:16px; font-weight:700; }
    .logo-mark { width:30px; height:30px; background:var(--accent); border-radius:7px; display:flex; align-items:center; justify-content:center; }
    .logo-mark svg { width:16px; height:16px; fill:white; }
    .sector-badge { font-size:11px; color:var(--accent); background:rgba(217,119,6,.12); border:0.5px solid rgba(217,119,6,.3); padding:3px 10px; border-radius:20px; letter-spacing:.6px; }
    .topbar-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
    .topbar-name { font-size:13px; }
    .topbar-avatar { width:30px; height:30px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:white; }
    .btn-icon { width:32px; height:32px; border-radius:7px; border:0.5px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; }
    .btn-icon:hover { background:var(--border2); color:var(--text); }
    .btn-icon svg { width:16px; height:16px; }

    .subbar { background:var(--surface); border-bottom:0.5px solid var(--border); padding:10px 20px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .subbar-title { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; }
    .filter-input { background:var(--bg); border:0.5px solid var(--border); border-radius:7px; padding:7px 12px; font-size:13px; color:var(--text); font-family:'DM Sans',sans-serif; outline:none; width:180px; transition:border-color .2s; }
    .filter-input:focus { border-color:var(--accent); }
    .filter-input::placeholder { color:var(--muted2); }
    .filter-select { background:var(--bg); border:0.5px solid var(--border); border-radius:7px; padding:7px 12px; font-size:12px; color:var(--muted); font-family:'DM Sans',sans-serif; outline:none; cursor:pointer; appearance:none; }
    .btn-primary { background:var(--accent); border:none; border-radius:7px; padding:8px 16px; font-size:13px; font-weight:500; color:white; font-family:'DM Sans',sans-serif; cursor:pointer; display:flex; align-items:center; gap:6px; transition:background .2s; margin-left:auto; }
    .btn-primary:hover { background:var(--accent2); }
    .btn-primary svg { width:14px; height:14px; }

    .metrics-bar { background:var(--surface); border-bottom:0.5px solid var(--border); padding:12px 20px; display:flex; gap:12px; overflow-x:auto; flex-shrink:0; }
    .metrics-bar::-webkit-scrollbar { height:0; }
    .metric-card { background:var(--surface2); border:0.5px solid var(--border); border-radius:10px; padding:12px 18px; flex-shrink:0; display:flex; align-items:center; gap:12px; min-width:140px; }
    .metric-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .metric-icon svg { width:18px; height:18px; }
    .metric-val { font-family:'Syne',sans-serif; font-size:22px; font-weight:700; line-height:1; }
    .metric-lbl { font-size:11px; color:var(--muted); margin-top:2px; }

    .main-layout { display:flex; flex:1; overflow:hidden; }
    .kanban-area { flex:1; overflow-x:auto; padding:16px; display:flex; gap:14px; align-items:flex-start; }
    .kanban-area::-webkit-scrollbar { height:6px; }
    .kanban-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

    .kanban-col { flex-shrink:0; width:290px; display:flex; flex-direction:column; }
    .col-header { display:flex; align-items:center; gap:8px; padding:10px 12px; background:var(--surface2); border:0.5px solid var(--border); border-radius:10px 10px 0 0; border-bottom:2px solid transparent; }
    .col-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .col-name { font-size:13px; font-weight:500; flex:1; }
    .col-count { font-size:11px; color:var(--muted2); background:var(--border2); padding:1px 7px; border-radius:10px; }
    .col-body { background:rgba(13,15,20,.5); border:0.5px solid var(--border); border-top:none; border-radius:0 0 10px 10px; padding:8px; min-height:120px; display:flex; flex-direction:column; gap:6px; }
    .col-body.drag-over { border-color:var(--accent); background:rgba(217,119,6,.04); }
    .col-empty { padding:20px 0; text-align:center; font-size:12px; color:var(--muted2); }
    .col-add-btn { width:100%; background:transparent; border:0.5px dashed var(--border2); border-radius:6px; padding:7px; font-size:12px; color:var(--muted2); font-family:'DM Sans',sans-serif; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; transition:all .15s; }
    .col-add-btn:hover { border-color:var(--accent); color:var(--accent); }

    /* CARD */
    .fd-card { background:var(--surface2); border:0.5px solid var(--border); border-radius:10px; cursor:pointer; transition:border-color .15s, transform .1s, box-shadow .15s; overflow:hidden; }
    .fd-card:hover { border-color:var(--accent); box-shadow:0 4px 16px rgba(217,119,6,.1); transform:translateY(-1px); }
    .card-img { width:100%; height:140px; object-fit:cover; display:block; background:var(--border2); }
    .card-img-placeholder { width:100%; height:100px; background:var(--border2); display:flex; align-items:center; justify-content:center; color:var(--muted2); font-size:12px; gap:6px; }
    .card-img-placeholder svg { width:18px; height:18px; }
    .card-body { padding:11px 12px; }
    .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:6px; margin-bottom:8px; }
    .card-title { font-size:13px; font-weight:500; line-height:1.3; flex:1; }
    .card-tipo { font-size:10px; padding:2px 7px; border-radius:4px; font-weight:600; flex-shrink:0; }
    .tipo-veiculo      { background:rgba(59,130,246,.15); color:#60A5FA; }
    .tipo-imovel       { background:rgba(139,92,246,.15); color:#A78BFA; }
    .tipo-equipamento  { background:rgba(6,182,212,.15); color:#22D3EE; }
    .tipo-outros       { background:var(--border2); color:var(--muted); }
    .card-tags { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
    .card-tag { font-size:10px; padding:1px 6px; border-radius:3px; background:var(--border2); color:var(--muted); }
    .card-footer { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
    .card-prio { font-size:10px; padding:2px 7px; border-radius:4px; font-weight:600; }
    .prio-low    { background:rgba(34,197,94,.15); color:#4ADE80; }
    .prio-medium { background:rgba(245,158,11,.15); color:#FCD34D; }
    .prio-high   { background:rgba(239,68,68,.15); color:#F87171; }
    .prio-urgent { background:rgba(139,92,246,.15); color:#A78BFA; }
    .card-value { font-size:11px; color:var(--green); font-weight:600; }
    .card-due { font-size:10px; color:var(--muted2); margin-left:auto; display:flex; align-items:center; gap:3px; }
    .card-due.overdue { color:var(--red); }
    .card-due.soon    { color:var(--amber); }
    .card-due svg { width:11px; height:11px; }
    .card-assignee { width:20px; height:20px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:600; color:white; flex-shrink:0; }
    .card-updates { font-size:10px; color:var(--muted2); display:flex; align-items:center; gap:3px; }
    .card-updates svg { width:11px; height:11px; }

    /* MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .2s; }
    .modal-overlay.open { opacity:1; pointer-events:auto; }
    .modal { background:var(--surface); border:0.5px solid var(--border); border-radius:14px; width:100%; max-width:660px; max-height:88vh; display:flex; flex-direction:column; overflow:hidden; transform:scale(.97) translateY(4px); transition:transform .2s; }
    .modal-overlay.open .modal { transform:scale(1) translateY(0); }
    .modal-header { padding:16px 20px 12px; border-bottom:0.5px solid var(--border); display:flex; align-items:flex-start; gap:12px; }
    .modal-title-input { width:100%; background:transparent; border:none; outline:none; font-family:'Syne',sans-serif; font-size:18px; font-weight:700; color:var(--text); resize:none; }
    .modal-title-input::placeholder { color:var(--muted2); }
    .modal-close { background:transparent; border:none; cursor:pointer; color:var(--muted2); padding:4px; border-radius:6px; }
    .modal-close:hover { color:var(--text); background:var(--border2); }
    .modal-close svg { width:18px; height:18px; }

    /* TABS */
    .modal-tabs { display:flex; border-bottom:0.5px solid var(--border); padding:0 20px; }
    .modal-tab { padding:9px 14px; font-size:13px; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; transition:all .15s; margin-bottom:-0.5px; }
    .modal-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
    .tab-pane { display:none; flex-direction:column; gap:14px; }
    .tab-pane.active { display:flex; }

    .modal-body { flex:1; overflow-y:auto; padding:18px 20px; }
    .modal-body::-webkit-scrollbar { width:4px; }
    .modal-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
    .modal-footer { padding:14px 20px; border-top:0.5px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }
    .field-row { display:flex; gap:12px; flex-wrap:wrap; }
    .field-group { display:flex; flex-direction:column; gap:5px; flex:1; min-width:120px; }
    .field-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; font-weight:500; }
    .field-select, .field-input { background:var(--bg); border:0.5px solid var(--border); border-radius:7px; padding:8px 11px; font-size:13px; color:var(--text); font-family:'DM Sans',sans-serif; outline:none; width:100%; transition:border-color .2s; appearance:none; }
    .field-select:focus, .field-input:focus { border-color:var(--accent); }
    .field-textarea { background:var(--bg); border:0.5px solid var(--border); border-radius:7px; padding:10px 11px; font-size:13px; color:var(--text); font-family:'DM Sans',sans-serif; outline:none; width:100%; resize:vertical; min-height:80px; line-height:1.5; transition:border-color .2s; }
    .field-textarea:focus { border-color:var(--accent); }
    .field-textarea::placeholder, .field-input::placeholder { color:var(--muted2); }
    .btn-ghost { background:transparent; border:0.5px solid var(--border); border-radius:7px; padding:8px 16px; font-size:13px; color:var(--muted); font-family:'DM Sans',sans-serif; cursor:pointer; }
    .btn-ghost:hover { border-color:var(--muted); color:var(--text); }
    .btn-save { background:var(--accent); border:none; border-radius:7px; padding:8px 20px; font-size:13px; font-weight:500; color:white; font-family:'DM Sans',sans-serif; cursor:pointer; }
    .btn-save:hover { background:var(--accent2); }
    .btn-danger { background:rgba(239,68,68,.1); border:0.5px solid rgba(239,68,68,.3); border-radius:7px; padding:8px 14px; font-size:13px; color:var(--red); font-family:'DM Sans',sans-serif; cursor:pointer; margin-right:auto; }

    /* UPLOAD DE IMAGENS */
    .upload-zone { border:1.5px dashed var(--border); border-radius:10px; padding:24px; text-align:center; cursor:pointer; transition:all .2s; }
    .upload-zone:hover, .upload-zone.dragover { border-color:var(--accent); background:rgba(217,119,6,.04); }
    .upload-zone svg { width:28px; height:28px; stroke:var(--muted2); margin-bottom:8px; }
    .upload-zone-title { font-size:13px; color:var(--muted); margin-bottom:4px; }
    .upload-zone-sub { font-size:11px; color:var(--muted2); }
    .upload-progress { display:none; align-items:center; gap:10px; padding:10px 0; font-size:12px; color:var(--muted); }
    .upload-progress-bar { flex:1; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
    .upload-progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .3s; }
    .images-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .image-thumb { position:relative; border-radius:7px; overflow:hidden; aspect-ratio:4/3; background:var(--border2); }
    .image-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .image-thumb-del { position:absolute; top:4px; right:4px; width:22px; height:22px; border-radius:50%; background:rgba(0,0,0,.7); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .15s; }
    .image-thumb:hover .image-thumb-del { opacity:1; }
    .image-thumb-del svg { width:12px; height:12px; stroke:white; }

    /* ATUALIZAÇÕES */
    .update-list { display:flex; flex-direction:column; gap:10px; max-height:220px; overflow-y:auto; }
    .update-list::-webkit-scrollbar { width:4px; }
    .update-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
    .update-item { display:flex; gap:10px; }
    .update-avatar { width:28px; height:28px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:white; flex-shrink:0; margin-top:2px; }
    .update-bubble { flex:1; background:var(--surface2); border:0.5px solid var(--border); border-radius:8px; padding:10px 12px; }
    .update-meta { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
    .update-author { font-size:12px; font-weight:500; }
    .update-date { font-size:11px; color:var(--muted2); }
    .update-body { font-size:13px; line-height:1.5; }
    .update-input-area { display:flex; flex-direction:column; gap:8px; }
    .update-textarea { background:var(--bg); border:0.5px solid var(--border); border-radius:7px; padding:10px 12px; font-size:13px; color:var(--text); font-family:'DM Sans',sans-serif; outline:none; resize:none; min-height:72px; line-height:1.5; transition:border-color .2s; }
    .update-textarea:focus { border-color:var(--accent); }
    .update-textarea::placeholder { color:var(--muted2); }
    .btn-update { background:var(--accent); border:none; border-radius:7px; padding:8px 16px; font-size:13px; font-weight:500; color:white; font-family:'DM Sans',sans-serif; cursor:pointer; align-self:flex-end; }
    .btn-update:hover { background:var(--accent2); }

    /* MOBILE */
    @media(max-width:768px){
      .topbar{padding:0 14px;}
      .subbar{padding:8px 14px;gap:8px;}
      .filter-input{width:130px;}
      .metrics-bar{padding:10px 14px;gap:8px;}
      .metric-card{min-width:110px;padding:10px 12px;}
      .kanban-area{padding:12px 10px;gap:10px;}
      .kanban-col{width:250px;}
      .modal{max-width:100%;border-radius:14px 14px 0 0;position:fixed;bottom:0;left:0;right:0;max-height:92vh;}
      .modal-overlay{align-items:flex-end;padding:0;}
      .field-row{flex-direction:column;}
      .images-grid{grid-template-columns:repeat(2,1fr);}
    }
    @media(max-width:480px){
      .topbar-name{display:none;}
      .kanban-col{width:230px;}
    }

    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:40px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    #toast{position:fixed;bottom:24px;right:24px;z-index:999;background:#d97706;color:white;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;}
    #toast.show{opacity:1;transform:translateY(0);}
    #toast.error{background:#dc2626;}
    #toast.success{background:#16a34a;}
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M4 5h4v4H4zm6 0h4v4h-4zm6 0h4v4h-4zM4 11h4v4H4zm6 0h4v4h-4zm6 0h4v4h-4zM4 17h4v4H4zm6 0h4v4h-4z"/></svg></div>
    FlowDesck
  </div>
  <span class="sector-badge">🔨 Leilão</span>
  <div class="topbar-right">
    <span class="topbar-name" id="topName"></span>
    <div class="topbar-avatar" id="topAvatar">?</div>
    <button class="btn-icon" title="Sair" onclick="handleSignOut()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</div>

<div class="subbar">
  <div class="subbar-title">Gestão de Lotes</div>
  <input class="filter-input" id="filterSearch" placeholder="🔍 Buscar lote..." oninput="renderAll()"/>
  <select class="filter-select" id="filterTipo" onchange="renderAll()">
    <option value="">Todos os tipos</option>
    <option value="veiculo">Veículo</option>
    <option value="imovel">Imóvel</option>
    <option value="equipamento">Equipamento</option>
    <option value="outros">Outros</option>
  </select>
  <select class="filter-select" id="filterPrio" onchange="renderAll()">
    <option value="">Todas prioridades</option>
    <option value="urgent">Urgente</option>
    <option value="high">Alta</option>
    <option value="medium">Média</option>
    <option value="low">Baixa</option>
  </select>
  <button class="btn-primary" onclick="openModal(null,'prospeccao')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Novo lote
  </button>
</div>

<div class="metrics-bar" id="metricsBar"></div>

<div class="main-layout">
  <div class="kanban-area" id="kanbanArea"><div class="spinner"></div></div>
</div>

<!-- MODAL LOTE -->
<div class="modal-overlay" id="cardModal">
  <div class="modal">
    <div class="modal-header">
      <div style="flex:1"><textarea class="modal-title-input" id="modalTitle" rows="2" placeholder="Nome do lote / bem..."></textarea></div>
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-tabs">
      <div class="modal-tab active" onclick="switchTab('details',this)">Detalhes</div>
      <div class="modal-tab" onclick="switchTab('images',this)">Fotos <span id="imgCount" style="font-size:10px;background:var(--border2);padding:1px 6px;border-radius:10px;margin-left:4px">0</span></div>
      <div class="modal-tab" onclick="switchTab('updates',this)">Atualizações <span id="updCount" style="font-size:10px;background:var(--border2);padding:1px 6px;border-radius:10px;margin-left:4px">0</span></div>
    </div>
    <div class="modal-body">

      <!-- DETALHES -->
      <div class="tab-pane active" id="paneDetails">
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">Tipo do bem</label>
            <select class="field-select" id="modalTipo">
              <option value="veiculo">Veículo</option>
              <option value="imovel">Imóvel</option>
              <option value="equipamento">Equipamento</option>
              <option value="outros">Outros</option>
            </select>
          </div>
          <div class="field-group">
            <label class="field-label">Prioridade</label>
            <select class="field-select" id="modalPrio">
              <option value="low">Baixa</option>
              <option value="medium" selected>Média</option>
              <option value="high">Alta</option>
              <option value="urgent">Urgente</option>
            </select>
          </div>
          <div class="field-group">
            <label class="field-label">Etapa</label>
            <select class="field-select" id="modalCol">
              <option value="prospeccao">Prospecção</option>
              <option value="avaliacao">Avaliação</option>
              <option value="publicado">Publicado</option>
              <option value="em_leilao">Em Leilão</option>
              <option value="arrematado">Arrematado</option>
              <option value="cancelado">Cancelado</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">Número do lote</label>
            <input class="field-input" id="modalLote" placeholder="ex: 042"/>
          </div>
          <div class="field-group">
            <label class="field-label">Valor de avaliação (R$)</label>
            <input class="field-input" id="modalValorAv" type="number" step="0.01" placeholder="0,00"/>
          </div>
          <div class="field-group">
            <label class="field-label">Lance inicial (R$)</label>

          <label class="field-label">Tags (separadas por vírgula)</label>

      <!-- FOTOS -->
      <div class="tab-pane" id="paneImages">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>

      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btnSave" onclick="saveCard()">Salvar lote</button>

  </div>
</div>

<div id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
import { initAnnouncements } from './js/announcements.js';
window._supabase = null;
const supabase = createClient(
  'https://ooejtjqxobfrletpssjm.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vZWp0anF4b2JmcmxldHBzc2ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTIzMzY4ODMsImV4cCI6MjA2NzkxMjg4M30.wTCrQfXVD6q47r-vN4iEsPkwaGV0qM-oTGnQpx525Mo'
);

const COLUMNS = [
  { id:'prospeccao', label:'Prospecção',  color:'#64748B' },
  { id:'avaliacao',  label:'Avaliação',   color:'#3B82F6' },
  { id:'publicado',  label:'Publicado',   color:'#D97706' },
  { id:'em_leilao',  label:'Em Leilão',   color:'#8B5CF6' },
  { id:'arrematado', label:'Arrematado',  color:'#22C55E' },
  { id:'cancelado',  label:'Cancelado',   color:'#EF4444' },
];
const PRIO  = { low:'Baixa', medium:'Média', high:'Alta', urgent:'Urgente' };
const TIPOS = { veiculo:'Veículo', imovel:'Imóvel', equipamento:'Equipamento', outros:'Outros' };
const SUPABASE_URL = 'https://ooejtjqxobfrletpssjm.supabase.co';

let currentUser = null, allCards = [], allUsers = [], currentCardId = null;
let pendingImages = []; // URLs temporárias já uploadadas mas não salvas no card ainda

// ── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  const { data:{ session } } = await supabase.auth.getSession();
  if (!session) { location.href='./index.html'; return; }
  const { data:profile } = await supabase.from('profiles').select('*').eq('id',session.user.id).single();
  if (!profile?.active) { await supabase.auth.signOut(); location.href='./index.html'; return; }
  if (profile.first_access) { location.href='./primeiro-acesso.html'; return; }
  initAnnouncements(supabase);
  currentUser = {...session.user,...profile};
  document.getElementById('topAvatar').textContent = (profile.full_name||'U')[0].toUpperCase();
  document.getElementById('topName').textContent   = profile.full_name||'';
  await Promise.all([loadCards(), loadUsers()]);
  supabase.channel('cards-lei').on('postgres_changes',{event:'*',schema:'public',table:'cards',filter:'sector=eq.leilao'},()=>loadCards()).subscribe();
}

async function loadUsers() {
  const { data } = await supabase.from('profiles').select('id,full_name').eq('active',true).order('full_name');
  allUsers = data||[];
  const sel = document.getElementById('modalAssignee');
  sel.innerHTML = '<option value="">Sem responsável</option>' + allUsers.map(u=>`<option value="${u.id}">${esc(u.full_name)}</option>`).join('');
}

async function loadCards() {
  const { data } = await supabase.from('cards').select('*,assignee:assignee_id(full_name)').eq('sector','leilao').order('position');
  if (data?.length) {
    const ids = data.map(c=>c.id);
    const { data:upds } = await supabase.from('card_updates').select('card_id').in('card_id',ids);
    data.forEach(c=>{ c._updates=(upds||[]).filter(u=>u.card_id===c.id).length; });
  }
  allCards = data||[];
  updateMetrics();
  renderAll();
}

function updateMetrics() {
  const total     = allCards.length;
  const emLeilao  = allCards.filter(c=>c.column_id==='em_leilao').length;
  const arrem     = allCards.filter(c=>c.column_id==='arrematado').length;
  const totalVal  = allCards.filter(c=>c.estimated_value).reduce((s,c)=>s+(c.estimated_value||0),0);
  const lanceArr  = allCards.filter(c=>c.admin_value).reduce((s,c)=>s+(c.admin_value||0),0);
  document.getElementById('metricsBar').innerHTML = `
    <div class="metric-card"><div class="metric-icon" style="background:rgba(100,116,139,.12)"><svg viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div><div><div class="metric-val">${total}</div><div class="metric-lbl">Total de lotes</div></div></div>
    <div class="metric-card"><div class="metric-icon" style="background:rgba(139,92,246,.12)"><svg viewBox="0 0 24 24" fill="none" stroke="#8B5CF6" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div><div><div class="metric-val" style="color:#A78BFA">${emLeilao}</div><div class="metric-lbl">Em leilão</div></div></div>
    <div class="metric-card"><div class="metric-icon" style="background:rgba(34,197,94,.12)"><svg viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="metric-val" style="color:var(--green)">${arrem}</div><div class="metric-lbl">Arrematados</div></div></div>
    ${totalVal>0?`<div class="metric-card"><div class="metric-icon" style="background:rgba(217,119,6,.12)"><svg viewBox="0 0 24 24" fill="none" stroke="#D97706" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><div><div class="metric-val" style="color:var(--amber);font-size:15px">R$ ${totalVal.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div><div class="metric-lbl">Valor avaliado</div></div></div>`:''}
    ${lanceArr>0?`<div class="metric-card"><div class="metric-icon" style="background:rgba(34,197,94,.12)"><svg viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div><div><div class="metric-val" style="color:var(--green);font-size:15px">R$ ${lanceArr.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div><div class="metric-lbl">Lances arrematados</div></div></div>`:''}`;
}

window.renderAll = function() {
  const search = (document.getElementById('filterSearch')?.value||'').toLowerCase();
  const tipo   = document.getElementById('filterTipo')?.value||'';
  const prio   = document.getElementById('filterPrio')?.value||'';
  let cards = allCards.filter(c=>{
    if (search && !c.title?.toLowerCase().includes(search) && !c.sprint?.toLowerCase().includes(search)) return false;
    if (tipo && c.card_type !== tipo) return false;
    if (prio && c.priority !== prio) return false;
    return true;
  });
  const area = document.getElementById('kanbanArea');
  area.innerHTML='';
  COLUMNS.forEach(col=>{
    const cc = cards.filter(c=>c.column_id===col.id);
    const div = document.createElement('div');
    div.className='kanban-col';
    div.innerHTML=`
      <div class="col-header" style="border-bottom-color:${col.color}">
        <div class="col-dot" style="background:${col.color}"></div>
        <span class="col-name">${col.label}</span>
        <span class="col-count">${cc.length}</span>
      </div>
      <div class="col-body" id="col-${col.id}" data-col="${col.id}">
        ${cc.length===0?'<div class="col-empty">Sem lotes</div>':cc.map(cardHTML).join('')}
        <button class="col-add-btn" onclick="openModal(null,'${col.id}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Adicionar lote
        </button>
      </div>`;
    area.appendChild(div);
    const body = div.querySelector('.col-body');
    body.addEventListener('dragover',e=>{e.preventDefault();body.classList.add('drag-over');});
    body.addEventListener('dragleave',()=>body.classList.remove('drag-over'));
    body.addEventListener('drop',e=>{e.preventDefault();body.classList.remove('drag-over');const id=e.dataTransfer.getData('cardId');if(id)moveCard(id,col.id);});
  });
};

function cardHTML(c) {
  const due = c.due_date ? new Date(c.due_date+'T12:00:00') : null;
  const today = new Date(); today.setHours(0,0,0,0);
  let dueClass='', dueHtml='';
  if (due) {
    const diff=(due-today)/86400000;
    dueClass=diff<0?'overdue':diff<=3?'soon':'';
    dueHtml=`<div class="card-due ${dueClass}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${due.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})}</div>`;
  }
  const tipo = c.card_type||'outros';
  const imgs = c.images||[];
  const firstImg = imgs.length ? `<img class="card-img" src="${imgs[0]}" alt="foto do lote" loading="lazy"/>` : '';
  const loteNum  = c.sprint ? `<span class="card-tag">Lote ${esc(c.sprint)}</span>` : '';
  const valor    = c.estimated_value ? `<span class="card-value">R$ ${Number(c.estimated_value).toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>` : '';
  const lanceArr = c.admin_value ? `<span style="font-size:10px;color:var(--green);font-weight:600">⬆ R$ ${Number(c.admin_value).toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>` : '';
  const assignee = c.assignee?.full_name ? `<div class="card-assignee" title="${esc(c.assignee.full_name)}">${c.assignee.full_name[0].toUpperCase()}</div>` : '';
  const updCount = c._updates ? `<div class="card-updates"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${c._updates}</div>` : '';
  const imgCount = imgs.length ? `<div class="card-updates" style="color:var(--accent)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>${imgs.length}</div>` : '';
  return `<div class="fd-card" draggable="true" ondragstart="event.dataTransfer.setData('cardId','${c.id}')" onclick="openModal('${c.id}')">
    ${firstImg}
    <div class="card-body">
      <div class="card-top">
        <div class="card-title">${esc(c.title)}</div>
        <span class="card-tipo tipo-${tipo}">${TIPOS[tipo]||'Outros'}</span>
      </div>
      <div class="card-tags">${loteNum}${(c.labels||[]).map(l=>`<span class="card-tag">${l}</span>`).join('')}</div>
      <div class="card-footer">
        <span class="card-prio prio-${c.priority}">${PRIO[c.priority]}</span>
        ${valor}${lanceArr}${assignee}${updCount}${imgCount}${dueHtml}
      </div>
    </div>
  </div>`;
}

async function moveCard(id,col) { await supabase.from('cards').update({column_id:col}).eq('id',id); showToast('Movido'); await loadCards(); }

// ── MODAL ─────────────────────────────────────────────────────────────────────
window.openModal = function(cardId, defaultCol) {
  currentCardId = cardId;
  pendingImages = [];
  // Reset tabs
  document.querySelectorAll('.modal-tab').forEach((t,i)=>t.classList.toggle('active',i===0));
  document.getElementById('paneDetails').classList.add('active');
  document.getElementById('paneImages').classList.remove('active');
  document.getElementById('paneUpdates').classList.remove('active');
  document.getElementById('btnSave').style.display='block';
  document.getElementById('updateText').value='';
  document.getElementById('uploadProgress').style.display='none';

  if (cardId) {
    const c = allCards.find(x=>x.id===cardId); if(!c) return;
    document.getElementById('modalTitle').value        = c.title;
    document.getElementById('modalTipo').value         = c.card_type||'veiculo';
    document.getElementById('modalPrio').value         = c.priority;
    document.getElementById('modalCol').value          = c.column_id;
    document.getElementById('modalLote').value         = c.sprint||'';
    document.getElementById('modalValorAv').value      = c.estimated_value||'';
    document.getElementById('modalLanceInicial').value = c.version_tag||'';
    document.getElementById('modalLanceArr').value     = c.admin_value||'';
    document.getElementById('modalDue').value          = c.due_date||'';
    document.getElementById('modalAssignee').value     = c.assignee_id||'';
    document.getElementById('modalDesc').value         = c.description||'';
    document.getElementById('modalLabels').value       = (c.labels||[]).join(', ');
    document.getElementById('btnDel').style.display    = 'block';
    pendingImages = [...(c.images||[])];
    renderImageGrid();
    loadUpdates(cardId);
  } else {
    ['modalTitle','modalLote','modalValorAv','modalLanceInicial','modalLanceArr','modalDue','modalDesc','modalLabels'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('modalTipo').value     = 'veiculo';
    document.getElementById('modalPrio').value     = 'medium';
    document.getElementById('modalCol').value      = defaultCol||'prospeccao';
    document.getElementById('modalAssignee').value = '';
    document.getElementById('btnDel').style.display= 'none';
    document.getElementById('updateList').innerHTML= '<div style="text-align:center;color:var(--muted2);font-size:13px;padding:20px 0">Salve o lote primeiro.</div>';
    document.getElementById('updCount').textContent= '0';
    document.getElementById('imgCount').textContent= '0';
    renderImageGrid();
  }
  document.getElementById('cardModal').classList.add('open');
};
window.closeModal = function() { document.getElementById('cardModal').classList.remove('open'); currentCardId=null; pendingImages=[]; };

window.switchTab = function(tab, el) {
  document.querySelectorAll('.modal-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['Details','Images','Updates'].forEach(p=>{ document.getElementById('pane'+p).classList.remove('active'); });
  document.getElementById('pane'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  document.getElementById('btnSave').style.display = tab==='updates' ? 'none' : 'block';
};

window.saveCard = async function() {
  const title = document.getElementById('modalTitle').value.trim();
  if (!title) { showToast('Informe o nome do lote','error'); return; }
  const labels = document.getElementById('modalLabels').value.split(',').map(l=>l.trim()).filter(Boolean);
  const payload = {
    title, sector:'leilao',
    card_type:      document.getElementById('modalTipo').value,
    priority:       document.getElementById('modalPrio').value,
    column_id:      document.getElementById('modalCol').value,
    sprint:         document.getElementById('modalLote').value.trim()||null,
    estimated_value:parseFloat(document.getElementById('modalValorAv').value)||null,
    version_tag:    document.getElementById('modalLanceInicial').value.trim()||null,
    admin_value:    parseFloat(document.getElementById('modalLanceArr').value)||null,
    due_date:       document.getElementById('modalDue').value||null,
    assignee_id:    document.getElementById('modalAssignee').value||null,
    description:    document.getElementById('modalDesc').value.trim()||null,
    labels,
    images:         pendingImages,
  };
  let error;
  if (currentCardId) {
    ({error} = await supabase.from('cards').update(payload).eq('id',currentCardId));
  } else {
    payload.created_by = currentUser.id;
    payload.position   = allCards.filter(c=>c.column_id===payload.column_id).length;
    ({error} = await supabase.from('cards').insert(payload));
  }
  if (error) { showToast('Erro: '+error.message,'error'); return; }
  showToast(currentCardId?'Lote atualizado!':'Lote criado!','success');
  closeModal(); await loadCards();
};

window.deleteCard = async function() {
  if (!currentCardId||!confirm('Excluir este lote?')) return;
  await supabase.from('cards').delete().eq('id',currentCardId);
  showToast('Excluído'); closeModal(); await loadCards();
};

// ── UPLOAD DE IMAGENS ─────────────────────────────────────────────────────────
window.handleFiles = async function(files) {
  if (!files?.length) return;
  const prog = document.getElementById('uploadProgress');
  const fill = document.getElementById('uploadFill');
  const pct  = document.getElementById('uploadPct');
  const lbl  = document.getElementById('uploadLabel');
  prog.style.display='flex';

  for (let i=0; i<files.length; i++) {
    const file = files[i];
    if (file.size > 5*1024*1024) { showToast(`${file.name} excede 5MB`,'error'); continue; }
    lbl.textContent = `Enviando ${i+1} de ${files.length}...`;
    const pctVal = Math.round((i/files.length)*100);
    fill.style.width = pctVal+'%'; pct.textContent = pctVal+'%';

    const ext  = file.name.split('.').pop();
    const path = `${currentUser.id}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
    const { data, error } = await supabase.storage.from('card-images').upload(path, file, { upsert:false });
    if (error) { showToast('Erro no upload: '+error.message,'error'); continue; }
    const { data: urlData } = supabase.storage.from('card-images').getPublicUrl(path);
    pendingImages.push(urlData.publicUrl);
    renderImageGrid();
  }
  fill.style.width='100%'; pct.textContent='100%';
  lbl.textContent='Upload concluído!';
  setTimeout(()=>{ prog.style.display='none'; }, 1500);
  document.getElementById('fileInput').value='';
};

function renderImageGrid() {
  document.getElementById('imgCount').textContent = pendingImages.length;
  const grid = document.getElementById('imagesGrid');
  if (!pendingImages.length) { grid.innerHTML=''; return; }
  grid.innerHTML = pendingImages.map((url,i)=>`
    <div class="image-thumb">
      <img src="${url}" alt="foto ${i+1}" loading="lazy"/>
      <button class="image-thumb-del" onclick="removeImage(${i})" title="Remover">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`).join('');
}

window.removeImage = function(idx) {
  pendingImages.splice(idx,1);
  renderImageGrid();
};

// Drag-drop na upload zone
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('dragover');});
zone.addEventListener('dragleave',()=>zone.classList.remove('dragover'));
zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('dragover');handleFiles(e.dataTransfer.files);});

// ── ATUALIZAÇÕES ──────────────────────────────────────────────────────────────
async function loadUpdates(cardId) {
  const { data } = await supabase.from('card_updates').select('*').eq('card_id',cardId).order('created_at',{ascending:false});
  const upds = data||[];
  document.getElementById('updCount').textContent = upds.length;
  const list = document.getElementById('updateList');
  if (!upds.length) { list.innerHTML='<div style="text-align:center;color:var(--muted2);font-size:13px;padding:20px 0">Nenhuma atualização ainda.</div>'; return; }
  list.innerHTML = upds.map(u=>`
    <div class="update-item">
      <div class="update-avatar">${(u.author_name||'?')[0].toUpperCase()}</div>
      <div class="update-bubble">
        <div class="update-meta">
          <span class="update-author">${esc(u.author_name||'?')}</span>
          <span class="update-date">${new Date(u.created_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>
        </div>
        <div class="update-body">${esc(u.body)}</div>
      </div>
    </div>`).join('');
}

window.postUpdate = async function() {
  const body = document.getElementById('updateText').value.trim();
  if (!body||!currentCardId) return;
  await supabase.from('card_updates').insert({ card_id:currentCardId, author_id:currentUser.id, author_name:currentUser.full_name||currentUser.email, body });
  document.getElementById('updateText').value='';
  showToast('Publicado!','success'); await loadUpdates(currentCardId);
};

window.handleSignOut = async function() { await supabase.auth.signOut(); location.href='./index.html'; };
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showToast(msg,type='success'){const el=document.getElementById('toast');el.textContent=msg;el.className='show '+(type==='error'?'error':type==='success'?'success':'');setTimeout(()=>{el.className='';},3000);}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
init();
</script>
</body>

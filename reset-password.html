<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlowDesck — Redefinir senha</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #080A10; color: #F1F5F9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: #0D0F14; border: 0.5px solid #1E2535; border-radius: 14px; padding: 2.5rem 2rem; width: 100%; max-width: 380px; box-shadow: 0 32px 80px rgba(0,0,0,0.6); }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; }
    .logo-mark { width: 36px; height: 36px; background: #3B82F6; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .logo-mark svg { width: 18px; height: 18px; fill: white; }
    .logo-name { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; }
    h2 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    p { font-size: 13px; color: #64748B; margin-bottom: 1.5rem; }
    label { display: block; font-size: 11px; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; font-weight: 500; }
    input { width: 100%; background: #080A10; border: 0.5px solid #1E2535; border-radius: 8px; padding: 11px 14px; font-size: 14px; color: #F1F5F9; font-family: 'DM Sans', sans-serif; outline: none; margin-bottom: 14px; transition: border-color 0.2s; }
    input:focus { border-color: #3B82F6; }
    button { width: 100%; background: #3B82F6; border: none; border-radius: 8px; padding: 12px; font-size: 14px; font-weight: 500; color: white; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.2s; margin-top: 4px; }
    button:hover { background: #2563EB; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; display: none; }
    .alert.error { background: rgba(239,68,68,0.1); border: 0.5px solid rgba(239,68,68,0.3); color: #F87171; }
    .alert.success { background: rgba(34,197,94,0.1); border: 0.5px solid rgba(34,197,94,0.3); color: #4ADE80; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M4 5h4v4H4zm6 0h4v4h-4zm6 0h4v4h-4zM4 11h4v4H4zm6 0h4v4h-4zm6 0h4v4h-4zM4 17h4v4H4zm6 0h4v4h-4z"/></svg></div>
    <div class="logo-name">FlowDesck</div>
  </div>
  <h2>Nova senha</h2>
  <p>Escolha uma senha forte para sua conta.</p>
  <div class="alert" id="alert"></div>
  <label for="pass">Nova senha</label>
  <input id="pass" type="password" placeholder="Mínimo 6 caracteres"/>
  <label for="pass2">Confirmar senha</label>
  <input id="pass2" type="password" placeholder="Repita a senha"/>
  <button id="btn" onclick="handleReset()">Redefinir senha</button>
</div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const supabase = createClient(
  'https://ooejtjqxobfrletpssjm.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vZWp0anF4b2JmcmxldHBzc2ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTIzMzY4ODMsImV4cCI6MjA2NzkxMjg4M30.wTCrQfXVD6q47r-vN4iEsPkwaGV0qM-oTGnQpx525Mo'
);
function showAlert(type, msg) {
  const el = document.getElementById('alert');
  el.className = 'alert ' + type; el.textContent = msg; el.style.display = 'block';
}
window.handleReset = async function() {
  const pass  = document.getElementById('pass').value;
  const pass2 = document.getElementById('pass2').value;
  if (!pass || pass.length < 6) { showAlert('error', 'Senha mínima de 6 caracteres.'); return; }
  if (pass !== pass2) { showAlert('error', 'As senhas não coincidem.'); return; }
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = 'Redefinindo...';
  const { error } = await supabase.auth.updateUser({ password: pass });
  if (error) { showAlert('error', 'Erro ao redefinir. O link pode ter expirado.'); btn.disabled = false; btn.textContent = 'Redefinir senha'; return; }
  showAlert('success', 'Senha redefinida! Redirecionando...');
  setTimeout(() => window.location.href = './Login.html', 2000);
};
</script>
</body>
</html>
